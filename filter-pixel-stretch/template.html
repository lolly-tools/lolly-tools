<svg xmlns="http://www.w3.org/2000/svg" id="ps-svg"
     viewBox="0 0 {{width}} {{height}}" width="{{width}}" height="{{height}}"
     preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block;">
  {{#if outSrc}}
  <!-- The whole composition (cover-framed photo + the pixel-stretch smear) is baked
       into one bitmap by hooks.js — a deterministic canvas resample (drawImage of a
       1px slice with smoothing off) so it looks identical in every browser, unlike
       the CSS `image-rendering: pixelated` + transform trick that WebKit fades. The
       bitmap already carries the export aspect, so map it 1:1 over the viewBox. In
       live mode the camera frame is composed the same way and arrives here as outSrc.

       Double-buffer: every render the shell replaces the canvas DOM wholesale, so the
       new <image>'s data URL has to decode before it can paint — during that gap the
       *previous* frame would flash through. So we draw the PREVIOUS bitmap (already
       browser-cached → instant) as a base layer underneath while the new one decodes;
       the inline script drops it once the top image has loaded, leaving a single
       image in the settled DOM (and any export). -->
  {{#if prevSrc}}<image href="{{prevSrc}}" data-ps-base="1" x="0" y="0" width="{{width}}" height="{{height}}" preserveAspectRatio="none"/>{{/if}}
  <image href="{{outSrc}}" data-ps-top="1" x="0" y="0" width="{{width}}" height="{{height}}" preserveAspectRatio="none"/>
  {{else}}
  <rect width="{{width}}" height="{{height}}" fill="#0f0f12"/>
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, sans-serif" font-size="34" fill="#9ca3af">{{default note "Choose an image to stretch"}}</text>
  {{/if}}
  <!-- Optional brand overlay (SUSE logo + animated lower-third name card), built as an
       SVG-string in hooks.js and injected here as SVG children so it survives raster,
       video AND vector export. Empty string when every overlay control is off. Its own
       <image> elements carry x/y/width/height and MUST NOT be force-sized by the script
       below (which is why that loop is scoped to the base/top frame images only). -->
  {{{overlaySvg}}}
</svg>
<script>
// Sync the SVG frame to the export dimension controls so non-square exports compose
// correctly; fall back to the template's {{width}}/{{height}} viewBox. IIFE + var:
// this <script> is re-created and re-run on every paint, so top-level const/let would
// throw "already declared" on the second render.
(function () {
  var svg = document.getElementById('ps-svg');
  if (!svg) return;
  var vb = (svg.getAttribute('viewBox') || '0 0 1080 1080').split(/\s+/).map(Number);
  var wEl = document.querySelector('[data-action="export-width"]');
  var hEl = document.querySelector('[data-action="export-height"]');
  var W = (wEl && parseFloat(wEl.value) > 0) ? parseFloat(wEl.value) : vb[2];
  var H = (hEl && parseFloat(hEl.value) > 0) ? parseFloat(hEl.value) : vb[3];
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  // Only the base/top frame images fill the whole frame; the brand-overlay images
  // (logo, headshot chip) carry their own x/y/width/height and must be left alone.
  var ims = svg.querySelectorAll('image[data-ps-top],image[data-ps-base]');
  for (var i = 0; i < ims.length; i++) { ims[i].setAttribute('width', W); ims[i].setAttribute('height', H); }
  // Drop the previous-frame base layer once the new (top) image has painted, so the
  // settled DOM / export carries a single image. The base only exists for one render
  // after the bitmap changes (hooks.js sends prevSrc only when it differs).
  var base = svg.querySelector('[data-ps-base]');
  var top = svg.querySelector('[data-ps-top]');
  if (base && top) {
    var drop = function () { if (base && base.parentNode) base.parentNode.removeChild(base); };
    top.addEventListener('load', drop, { once: true });
    // Fallback if 'load' already fired (cached) or never fires: drop shortly after.
    setTimeout(drop, 350);
  }
})();
</script>
