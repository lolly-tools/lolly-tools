<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="820" viewBox="0 0 1100 820" role="img" aria-label="Text Helper — format, decode and de-identify text">
  <!--
    Lean, ANIMATED committed gallery card for the text-helper tool. A MOCK (not a screenshot):
    a JSON panel on the brand pine background — matching the other utility cards' pine #0c322c
    treatment — that formats + DE-IDENTIFIES a value (a persimmon redaction bar wipes across the
    email on a loop) with a blinking caret and a soft sheen. Flat (no filters), width/height =
    render dims (1100x820) so it never stretches, base state complete, system-mono fallback.
  -->
  <style>
    .mono{font-family:'SUSE Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:42px}
    .key{fill:#8fe6c6}.str{fill:#e7f5ee}.pun{fill:#5f9b86}.num{fill:#7cc6ff}
    .lab{font-family:'SUSE','SUSE Sans',system-ui,sans-serif;font-size:26px;fill:#8fb9a8;font-weight:600}
    .sheen{animation:th-sheen 6s ease-in-out infinite}
    @keyframes th-sheen{0%{transform:translateX(-520px) skewX(-14deg)}42%{transform:translateX(1500px) skewX(-14deg)}100%{transform:translateX(1500px) skewX(-14deg)}}
    /* redaction bar wipes across the email value (de-identify cue), holds, then clears — seamless */
    .redact{animation:th-redact 4.2s ease-in-out infinite;transform-box:fill-box;transform-origin:left center}
    @keyframes th-redact{0%,8%{transform:scaleX(0)}30%,74%{transform:scaleX(1)}96%,100%{transform:scaleX(0)}}
    .caret{fill:#30ba78;animation:th-blink 1.1s steps(1) infinite}
    @keyframes th-blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @media (prefers-reduced-motion:reduce){.sheen{display:none}.redact{animation:none;transform:scaleX(1)}.caret{animation:none;opacity:.9}}
  </style>
  <defs>
    <linearGradient id="th-band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".16"/><stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="820" fill="#0c322c"/>
  <!-- panel -->
  <rect x="70" y="86" width="960" height="648" rx="22" fill="#0b2f29"/>
  <rect x="70" y="86" width="960" height="60" rx="22" fill="#082019"/>
  <circle cx="108" cy="116" r="7" fill="#fe7c3f"/><circle cx="134" cy="116" r="7" fill="#f4c04e"/><circle cx="160" cy="116" r="7" fill="#30ba78"/>
  <text x="1000" y="125" class="lab" text-anchor="end">JSON · de-identify</text>
  <!-- json body -->
  <g class="mono">
    <text x="112" y="248"><tspan class="pun">{</tspan></text>
    <text x="160" y="316"><tspan class="key">"name"</tspan><tspan class="pun">: </tspan><tspan class="str">"Ada Lovelace"</tspan><tspan class="pun">,</tspan></text>
    <text x="160" y="384"><tspan class="key">"email"</tspan><tspan class="pun">: </tspan><tspan class="str">"ada@analytical.io"</tspan><tspan class="pun">,</tspan></text>
    <text x="160" y="452"><tspan class="key">"token"</tspan><tspan class="pun">: </tspan><tspan class="str">"eyJhbGciOi…"</tspan><tspan class="pun">,</tspan></text>
    <text x="160" y="520"><tspan class="key">"count"</tspan><tspan class="pun">: </tspan><tspan class="num">1843</tspan></text>
    <text x="112" y="588"><tspan class="pun">}</tspan></text>
  </g>
  <!-- redaction bar over the email value -->
  <rect class="redact" x="406" y="356" width="430" height="40" rx="7" fill="#fe7c3f"/>
  <rect class="caret" x="118" y="620" width="6" height="44"/>
  <!-- sheen -->
  <rect class="sheen" x="-320" y="-40" width="300" height="900" fill="url(#th-band)"/>
</svg>
