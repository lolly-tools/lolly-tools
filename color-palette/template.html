## Primary colors

SUSE remains a green brand through and through. The primary color palette reflects SUSE's unique identity green roots.

## Color combinations and backgrounds

Pine, Jungle, White and Fog are the primary background colors.

Use the following color palette combinations (background and foregrounds) to ensure accessibility, clarity and legibility for both written and graphic content.

- Pine Background:  Mint, Persimmon, Jungle, Fog, White
- Jungle background: White - Graphics only, White - Graphics only, Pine, Midnight
- White bacground: Jungle - Graphics Only, Pine, Watehole, Midnight
- Fog: Jungle - Graphics only, Pine, Waterhole, Midnight

## Primary colors shades

To create depth and contrast, graphic designs may feature shades of primary colors. Do not use these shades as a replacement for primary colors.

#0c322c, #025937, #008657, #30ba78, #42d29f, #83e1be, #c0efde, #eafaf4, #47190d, #8e2810, #bd3314, #ff5a2b, #fe7c3f, #ffb184, #ffd3bd, #ffefe9, #0a112b, #192072, #0b41b7, #2453ff, #3c8eef, #81aefc, #c8dafc, #e6edfe, #0c322c, #01564a, #008878, #00bda7, #38d5b4, #90ebcd, #bff1ea, #eafaf8, #1d1d1d, #3e3e3e, #525252, #6f6f6f, #999999, #bababa, #dcdbdc, #efefef

## Infographics palette

The infographics palette is a secondary palette designed to complement and expand upon the primary palette. Filling gaps in the color wheel, it maximizes flexibility while maintaining harmony with the primary SUSE palette.
This secondary palette is for limited uses only (e.g., infographics, charts and other data visualizations).
Do not use secondary colors as a replacement for primary colors or shades.

- use typography or the logo with a lack of contrast.

    {
        col=col.replace('rgb(','').replace(')','').split(',');
        var r=parseInt(col[0], 10).toString(16);
        var g=parseInt(col[1], 10).toString(16);
        var b=parseInt(col[2], 10).toString(16);
        r=r.length==1?'0'+r:r; g=g.length==1?'0'+g:g; b=b.length==1?'0'+b:b;
        var colHex='#'+r+g+b;
        return colHex;
    }
}

const swatches = document.querySelectorAll('.swatch');

swatches.forEach((swatch) => {
  const name = swatch.getAttribute('name');

  const swatchName = document.createElement('h2');
  swatchName.innerText = `${name}`;
  swatch.appendChild(swatchName);

  swatch.style.backgroundColor = `var(--color-${name})`;

  const backgroundColor = window.getComputedStyle(swatch).getPropertyValue('background-color');

  const colors = backgroundColor.match(/\d+/g);
  if (colors) {
    const r = parseInt(colors[0]);
    const g = parseInt(colors[1]);
    const b = parseInt(colors[2]);
    const o = Math.round(((r * 299) + (g * 587) + (b * 114)) / 1000);
    swatch.style.color = o > 125 ? 'black' : 'white';
  }

  const span = document.createElement('span');
  span.innerHTML = `<i>rgb</i> <b>${backgroundColor}</b>`;
  swatch.appendChild(span);

  const hexval = document.createElement('span');
  hexval.innerHTML = `<i>hex</i> <b>${rgbToHex(backgroundColor)}</b>`;
  swatch.appendChild(hexval);

});
 


const aioColors = document.querySelectorAll(".swatch b");

aioColors.forEach((color) => {
  color.addEventListener("click", () => {
    const selection = window.getSelection();
    const range = document.createRange();
    range.selectNodeContents(color);
    selection.removeAllRanges();
    selection.addRange(range);

    try {
      document.execCommand("copy");
      selection.removeAllRanges();

      const original = color.textContent;
      // color.textContent = 'Copied!';
      color.classList.add("success");

      setTimeout(() => {
        color.textContent = original;
        color.classList.remove("success");
      }, 1500);
    } catch (e) {
      const errorMsg = document.querySelector(".error-msg");
      errorMsg.classList.add("show");

      setTimeout(() => {
        errorMsg.classList.remove("show");
      }, 1500);
    }
  });
});

})();
</script>
