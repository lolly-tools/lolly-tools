<script>
// Wrapped in an IIFE: this template script is re-injected and re-executed on
// every canvas paint (and on every soft re-visit to the tool). Top-level
// const/function declarations would land in the page's global lexical scope and
// survive the script node's removal, so a second run would throw
// "Identifier already declared" and silently abort before the swatches are
// built — leaving only the static button. Function scope keeps each run clean.
(function () {

// "Copy LLM Instructions" builds its prompt from the palette that is actually
// rendered (each .swatch tile's name + computed hex), so the copied text always
// matches the tiles above and no brand values are hardcoded here.
function buildLlmColorInstructions() {
  var lines = [];
  document.querySelectorAll('.swatch').forEach(function (sw) {
    var name = sw.getAttribute('name');
    var hex = rgbToHex(window.getComputedStyle(sw).getPropertyValue('background-color'));
    if (name && hex) lines.push(name + ' ' + hex);
  });
  return 'Use this design system\'s color palette. Prefer these exact hex values over invented ones, '
    + 'keep combinations legible (check the contrast between any text and its background), '
    + 'and do not introduce colors from outside the palette.\n\n'
    + 'The full color palette with color names:\n\n'
    + lines.join('\n');
}

document.getElementById('copyLlmBtn').addEventListener('click', function() {
  navigator.clipboard.writeText(buildLlmColorInstructions()).then(() => {
    const btn = this;
    const original = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('success');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('success');
    }, 1500);
  });
});


function rgbToHex(col)
{
    if(col.charAt(0)=='r')
    {
        col=col.replace('rgb(','').replace(')','').split(',');
        var r=parseInt(col[0], 10).toString(16);
        var g=parseInt(col[1], 10).toString(16);
        var b=parseInt(col[2], 10).toString(16);
        r=r.length==1?'0'+r:r; g=g.length==1?'0'+g:g; b=b.length==1?'0'+b:b;
        var colHex='#'+r+g+b;
        return colHex;
    }
}

const swatches = document.querySelectorAll('.swatch');

swatches.forEach((swatch) => {
  const name = swatch.getAttribute('name');

  const swatchName = document.createElement('h2');
  swatchName.innerText = `${name}`;
  swatch.appendChild(swatchName);

  swatch.style.backgroundColor = `var(--color-${name})`;

  const backgroundColor = window.getComputedStyle(swatch).getPropertyValue('background-color');

  const colors = backgroundColor.match(/\d+/g);
  if (colors) {
    const r = parseInt(colors[0]);
    const g = parseInt(colors[1]);
    const b = parseInt(colors[2]);
    const o = Math.round(((r * 299) + (g * 587) + (b * 114)) / 1000);
    swatch.style.color = o > 125 ? 'black' : 'white';
  }

  const span = document.createElement('span');
  span.innerHTML = `<i>rgb</i> <b>${backgroundColor}</b>`;
  swatch.appendChild(span);

  const hexval = document.createElement('span');
  hexval.innerHTML = `<i>hex</i> <b>${rgbToHex(backgroundColor)}</b>`;
  swatch.appendChild(hexval);

});
 


const aioColors = document.querySelectorAll(".swatch b");

aioColors.forEach((color) => {
  color.addEventListener("click", () => {
    const selection = window.getSelection();
    const range = document.createRange();
    range.selectNodeContents(color);
    selection.removeAllRanges();
    selection.addRange(range);

    try {
      document.execCommand("copy");
      selection.removeAllRanges();

      const original = color.textContent;
      // color.textContent = 'Copied!';
      color.classList.add("success");

      setTimeout(() => {
        color.textContent = original;
        color.classList.remove("success");
      }, 1500);
    } catch (e) {
      const errorMsg = document.querySelector(".error-msg");
      errorMsg.classList.add("show");

      setTimeout(() => {
        errorMsg.classList.remove("show");
      }, 1500);
    }
  });
});

})();
