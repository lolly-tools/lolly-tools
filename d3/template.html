<svg id="d3-svg" xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 {{width}} {{height}}" width="{{width}}" height="{{height}}"
     style="width:100%;height:auto;display:block;"
     data-lolly-anno="{{chartType}} {{delimiter}} {{stackMode}} {{curve}} {{sizeBy}} {{sort}} {{yScaleType}} {{numberFormat}} {{palette}} {{colorBy}} {{textColor}} {{strokeColor}} {{legendPosition}}">
  <defs>
    <style>
      /* Brand font via the injected var (community pattern — no @font-face here;
         the shell loads the active brand's faces). 'SUSE' rides the fallback
         tail so an already-registered face still resolves on older shells. */
      #d3-svg text, #d3-svg tspan { font-family: var(--font-brand, 'SUSE', system-ui, -apple-system, sans-serif); }
      /* Click-to-focus: annotated parts jump to their sidebar control on click — hint it. */
      #d3-svg [data-canvas-input] { cursor: pointer; }
    </style>
  </defs>
  <rect id="d3-bg" width="{{width}}" height="{{height}}" fill="{{_bgFill}}" data-canvas-input="background" pointer-events="all"/>
  <g id="d3-plot" data-canvas-input="data"></g>
</svg>
<script type="application/json" id="d3-state">{{{_state}}}</script>
<script>
(function () {
  /* Idempotent per-paint IIFE (the template re-runs on every render). An epoch
     guard drops any stale async callback from a previous paint. See street-map. */
  window.__d3Epoch = (window.__d3Epoch || 0) + 1;
  var _ep = window.__d3Epoch;
  function alive() { return window.__d3Epoch === _ep; }

  var stateEl = document.getElementById('d3-state');
  var svgEl = document.getElementById('d3-svg');
  if (!stateEl || !svgEl) return;

  var state;
  try { state = JSON.parse(stateEl.textContent || '{}'); } catch (e) { return; }
  if (!state || !state.cfg) return;

  /* Load d3 once (dedupe concurrent loads across re-paints), then render. */
  var LIB = '/tools/d3/lib/d3.min.js';
  function loadD3() {
    if (window.d3) return Promise.resolve();
    window.__d3Loading = window.__d3Loading || new Promise(function (res, rej) {
      var s = document.createElement('script');
      s.src = LIB; s.onload = res;
      /* Remove the failed node so a re-paint doesn't accrete orphan <script>s. */
      s.onerror = function () { s.remove(); window.__d3Loading = null; rej(new Error('d3 load failed')); };
      document.head.appendChild(s);
    });
    return window.__d3Loading;
  }

  loadD3().then(function () {
    if (!alive()) return;
    /* Loaded but no global (e.g. an SPA fallback served index.html at the lib URL)
       — surface it rather than leaving a silently blank canvas. */
    if (!window.d3) { message('Chart library failed to load.'); return; }
    try { render(state, window.d3); }
    catch (err) { console.error('[d3] render error:', err); message(String(err && err.message || err)); }
  }).catch(function (e) { console.error('[d3]', e); message('Chart library failed to load.'); });

  /* ── palettes (shipped fallback) ──────────────────────────────────────────────────────── */
  /* Ordered categorical hues — distinct colour families, CVD-considered. */
  /* Lead with a green that clears WCAG 1.4.11 (3:1) on white — Pine #30BA78 is
     only ~2.5:1, so the deeper #008657 takes slot 0 (like the reference tool). */
  var CATEGORICAL = ['#008657','#2453FF','#FE7C3F','#5D4F99','#00BDA7','#BD3314','#3C8EEF','#192072','#30BA78','#FAB088'];
  /* Sequential ramps, light → dark, as interpolate anchors. */
  var RAMPS = {
    suse:      ['#DDF3EA','#8FE3C0','#30BA78','#0C7C4E','#0C322C'],
    pine:      ['#DDF3EA','#8FE3C0','#30BA78','#0C7C4E','#0C322C'],
    waterhole: ['#E3EAFF','#93A9FF','#2453FF','#1B37B8','#192072'],
    warm:      ['#FDE7D8','#FAB088','#FE7C3F','#C6461B','#7A2A10'],
    cool:      ['#BFF1EA','#5FC7D8','#2E77E6','#1E2C86','#192072'],
    diverging: ['#2453FF','#93A9FF','#EFEFEF','#FCB98F','#FE7C3F'],
    mono:      ['#D6E3DE','#93B7AA','#3E7D68','#1C4E40','#0C322C']
  };

  /* ── colour helpers (WCAG legibility guard, ported from chart-creator) ─────── */
  function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }
  function isHex(s) { return /^#[0-9a-fA-F]{6}$/.test(String(s)); }
  function lum(hex) {
    var c = String(hex).replace('#', '');
    if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
    var f = function (v) { v /= 255; return v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4); };
    return 0.2126*f(parseInt(c.slice(0,2),16)) + 0.7152*f(parseInt(c.slice(2,4),16)) + 0.0722*f(parseInt(c.slice(4,6),16));
  }
  function contrast(a, b) { var hi = Math.max(lum(a),lum(b)), lo = Math.min(lum(a),lum(b)); return (hi+0.05)/(lo+0.05); }
  /* Crossover for the non-black ink #0c322c (luminance 0.025) is ~0.23 — above it
     dark ink out-contrasts white on the mark. (0.42 wrongly whitened mid greens.) */
  function autoText(bg) { return lum(bg) > 0.22 ? '#0c322c' : '#ffffff'; }
  function toRgb(hex){var c=String(hex).replace('#','');return [parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)];}
  function toHex(a){return '#'+a.map(function(v){return clamp(Math.round(v),0,255).toString(16).padStart(2,'0');}).join('');}
  /* Nudge a fill away from the surface until it clears a legibility floor. */
  function legible(hex, bg) {
    if (!isHex(hex) || !isHex(bg)) return hex;
    var FLOOR = 1.9;
    if (contrast(hex, bg) >= FLOOR) return hex;
    var target = lum(bg) > 0.4 ? [0,0,0] : [255,255,255];
    var rgb = toRgb(hex);
    for (var t = 0.15; t < 1; t += 0.15) {
      var cand = toHex(rgb.map(function (v,i){ return v + (target[i]-v)*t; }));
      if (contrast(cand, bg) >= FLOOR) return cand;
    }
    return toHex(target);
  }

  function message(text) {
    var d3 = window.d3;
    if (!d3) return;
    var svg = d3.select('#d3-svg');
    var W = state.cfg.width, H = state.cfg.height;
    svg.attr('viewBox', '0 0 '+W+' '+H).attr('width', W).attr('height', H);
    d3.select('#d3-bg').attr('width', W).attr('height', H);
    var g = d3.select('#d3-plot'); g.selectAll('*').remove();
    g.append('text').attr('x', W/2).attr('y', H/2).attr('text-anchor','middle')
      .attr('font-size', 26).attr('font-weight', 500)
      .attr('fill', state.cfg.textColor).attr('opacity', 0.6).text(text || 'No data');
  }

  /* ── render ────────────────────────────────────────────────────────────────── */
  function render(state, d3) {
    var cfg = state.cfg, data = state.data;
    var W = cfg.width, H = cfg.height;
    var guardBg = cfg.transparent ? '#ffffff' : (isHex(cfg.background) ? cfg.background : '#ffffff');
    var ink = isHex(cfg.textColor) ? cfg.textColor : '#0c322c';

    var svg = d3.select('#d3-svg');
    svg.attr('viewBox', '0 0 '+W+' '+H).attr('width', W).attr('height', H);
    d3.select('#d3-bg').attr('width', W).attr('height', H).attr('fill', cfg.transparent ? 'none' : (isHex(cfg.background) ? cfg.background : '#ffffff'));
    var root = d3.select('#d3-plot'); root.selectAll('*').remove();

    var cats = (data.categories || []).slice();
    var series = (data.series || []).map(function (s) { return { name: s.name, values: (s.values||[]).slice() }; });
    var numericCols = (data.numericCols || []);

    /* Charts whose legend keys are the series (they also need cats + series). */
    var needSeries = ['bar','bar-horizontal','line','area','radar','lollipop','dumbbell','slope','bump','stream','marimekko'].indexOf(cfg.chartType) >= 0;
    var needScatter = cfg.chartType === 'scatter' || cfg.chartType === 'parallel';
    var needHist = cfg.chartType === 'histogram';
    if ((needSeries && (!cats.length || !series.length)) ||
        (needScatter && numericCols.length < 2) ||
        (needHist && !numericCols.length) ||
        (!needSeries && !needScatter && !needHist && (!cats.length || !series.length))) {
      message(data.note || (needScatter ? 'This chart needs at least two numeric columns.' : 'Paste a table with a label column and numeric columns.'));
      return;
    }

    /* Colour functions. The categorical option follows the active brand's
       spectrum when the hook resolved one (cfg.brandPalette — see hooks.js);
       the shipped set is the fallback. */
    function catColorFn(n) {
      if (cfg.palette === 'suse') {
        var cat = (cfg.brandPalette && cfg.brandPalette.length) ? cfg.brandPalette : CATEGORICAL;
        return function (i) { return legible(cat[i % cat.length], guardBg); };
      }
      var ramp = d3.interpolateRgbBasis(RAMPS[cfg.palette] || RAMPS.suse);
      return function (i) { return legible(ramp(n <= 1 ? 0.72 : (0.12 + 0.76 * (i/(n-1)))), guardBg); };
    }
    function seqColorFn(min, max) {
      var anchors = (cfg.palette && cfg.palette !== 'suse') ? RAMPS[cfg.palette] : RAMPS.pine;
      var ramp = d3.interpolateRgbBasis(anchors || RAMPS.pine);
      /* A diverging ramp is only meaningful centred on zero — when the data spans
         zero, put the neutral middle at 0 with a symmetric domain so blue/orange
         straddle it. Otherwise fall back to the plain min→max sequential mapping. */
      if (cfg.palette === 'diverging' && min < 0 && max > 0) {
        var m = Math.max(-min, max);
        return function (v) { return ramp(clamp(0.5 + v / (2 * m), 0, 1)); };
      }
      return function (v) { var t = max > min ? (v - min) / (max - min) : 0.5; return ramp(clamp(t, 0.05, 1)); };
    }

    /* Number formatting. */
    var fmt = makeFmt(cfg.numberFormat, d3);

    /* ── title band ──────────────────────────────────────────────────────────── */
    var PAD = Math.round(Math.min(W, H) * 0.045) + 16;
    var titleH = 0;
    if (cfg.heading && cfg.subheading) titleH = 78;
    else if (cfg.heading || cfg.subheading) titleH = 48;
    if (cfg.heading) {
      root.append('text').attr('x', PAD).attr('y', PAD + 34).attr('data-canvas-input', 'heading')
        .attr('font-size', 34).attr('font-weight', cfg.titleWeight).attr('fill', ink).text(cfg.heading);
    }
    if (cfg.subheading) {
      root.append('text').attr('x', PAD).attr('y', PAD + (cfg.heading ? 66 : 30)).attr('data-canvas-input', 'subheading')
        .attr('font-size', 20).attr('font-weight', 400).attr('fill', ink).attr('opacity', 0.62).text(cfg.subheading);
    }

    /* ── legend items ────────────────────────────────────────────────────────── */
    var legendItems = null;
    /* Charts whose legend keys are the categories (treemap/pack/sunburst/icicle
       self-label their cells, so they carry no swatch legend). */
    var catCharts = ['pie','donut','radial-bar','polar','funnel','waffle'];
    var barByCat = (cfg.chartType === 'bar' || cfg.chartType === 'bar-horizontal') && cfg.colorBy === 'category';
    if (cfg.showLegend) {
      if (needSeries && !barByCat && series.length > 1) {
        var scf = catColorFn(series.length);
        legendItems = series.map(function (s, i) { return { label: s.name, color: scf(i) }; });
      } else if (catCharts.indexOf(cfg.chartType) >= 0 || barByCat) {
        var ccf = catColorFn(cats.length);
        legendItems = cats.map(function (c, i) { return { label: c, color: ccf(i) }; });
      }
    }

    /* ── plot rect after title + legend ──────────────────────────────────────── */
    var box = { x: PAD, y: PAD + titleH, w: W - 2*PAD, h: H - 2*PAD - titleH };
    var legPos = cfg.legendPosition;
    var legendReserve = 0;
    if (legendItems && legendItems.length) {
      var LSZ = clamp(cfg.labelSize, 12, 30);
      if (legPos === 'right' || legPos === 'left') {
        var longest = legendItems.reduce(function (m, it) { return Math.max(m, String(it.label).length); }, 0);
        legendReserve = clamp(Math.round(longest * LSZ * 0.56) + LSZ + 28, 120, Math.round(W * 0.34));
        if (legPos === 'left') box.x += legendReserve; box.w -= legendReserve;
      } else {
        var rows = estimateLegendRows(legendItems, box.w, LSZ);
        legendReserve = rows * (LSZ + 12) + 16;
        if (legPos === 'top') box.y += legendReserve; box.h -= legendReserve;
      }
    }

    var api = { d3: d3, root: root, cfg: cfg, data: data, cats: cats, series: series, numericCols: numericCols,
                box: box, ink: ink, guardBg: guardBg, fmt: fmt, catColorFn: catColorFn, seqColorFn: seqColorFn,
                barByCat: barByCat };

    /* ── dispatch ────────────────────────────────────────────────────────────── */
    switch (cfg.chartType) {
      case 'bar':            drawBars(api, false); break;
      case 'bar-horizontal': drawBars(api, true); break;
      case 'line':           drawLineArea(api, false); break;
      case 'area':           drawLineArea(api, true); break;
      case 'scatter':        drawScatter(api); break;
      case 'pie':            drawPie(api, false); break;
      case 'donut':          drawPie(api, true); break;
      case 'radial-bar':     drawRadialBar(api); break;
      case 'radar':          drawRadar(api); break;
      case 'treemap':        drawHierarchy(api, 'treemap'); break;
      case 'pack':           drawHierarchy(api, 'pack'); break;
      case 'heatmap':        drawHeatmap(api); break;
      case 'histogram':      drawHistogram(api); break;
      case 'lollipop':       drawLollipop(api); break;
      case 'dumbbell':       drawDumbbell(api); break;
      case 'slope':          drawSlope(api); break;
      case 'bump':           drawBump(api); break;
      case 'stream':         drawStream(api); break;
      case 'waterfall':      drawWaterfall(api); break;
      case 'marimekko':      drawMarimekko(api); break;
      case 'parallel':       drawParallel(api); break;
      case 'polar':          drawPolar(api); break;
      case 'funnel':         drawFunnel(api); break;
      case 'gauge':          drawGauge(api); break;
      case 'waffle':         drawWaffle(api); break;
      case 'sunburst':       drawSunburst(api); break;
      case 'icicle':         drawIcicle(api); break;
      case 'chord':          drawChord(api); break;
      default:               drawBars(api, false);
    }

    /* Legend drawn last so it sits above the plot. */
    if (legendItems && legendItems.length) drawLegend(api, legendItems, legPos, legendReserve, PAD, titleH);

    /* A quiet diagnostic caption when the parser reshaped/adjusted the data
       (pivoted long data, single column, truncation, header hint) — so the user
       sees WHAT happened instead of a silently-surprising chart. */
    if (data.note) root.append('text').attr('x', PAD).attr('y', H - 12)
      .attr('font-size', 15).attr('font-weight', 400).attr('fill', ink).attr('opacity', 0.5).text(data.note);
  }

  /* ── shared: number format ───────────────────────────────────────────────── */
  function makeFmt(kind, d3) {
    switch (kind) {
      case 'si':       return function (v) { return d3.format('~s')(v); };
      case 'comma':    return function (v) { return d3.format(',')(v); };
      case 'integer':  return function (v) { return d3.format(',.0f')(v); };
      case 'decimal1': return function (v) { return d3.format(',.1f')(v); };
      case 'decimal2': return function (v) { return d3.format(',.2f')(v); };
      case 'percent':  return function (v) { return d3.format(',.1~f')(v) + '%'; };
      case 'currency': return function (v) { return '€' + d3.format(',')(round2(v)); };
      default:         return function (v) {
        if (!isFinite(v)) return '';
        var a = Math.abs(v);
        if (a >= 10000) return d3.format('~s')(v);
        if (Number.isInteger(v)) return d3.format(',')(v);
        return d3.format(',.2~f')(v);
      };
    }
  }
  function round2(v){ return Math.round(v*100)/100; }
  function trunc(s, n) { s = String(s); return s.length > n ? s.slice(0, Math.max(1, n-1)) + '…' : s; }

  /* ── shared: legend ───────────────────────────────────────────────────────── */
  function estimateLegendRows(items, width, sz) {
    var x = 0, rows = 1, gap = 24;
    for (var i = 0; i < items.length; i++) {
      var w = sz + 8 + String(items[i].label).length * sz * 0.56 + gap;
      if (x + w > width && x > 0) { rows++; x = 0; }
      x += w;
    }
    return rows;
  }
  function drawLegend(api, items, pos, reserve, PAD, titleH) {
    var d3 = api.d3, cfg = api.cfg, ink = api.ink, W = cfg.width, H = cfg.height;
    var sz = clamp(cfg.labelSize, 12, 30);
    var g = api.root.append('g').attr('class', 'legend').attr('data-canvas-input', 'legendPosition');
    var dot = clamp(sz * 0.82, 10, 26);
    if (pos === 'right' || pos === 'left') {
      var lx = (pos === 'left') ? PAD : W - reserve + 8;
      var totalH = items.length * (sz + 12);
      var ly = clamp(api.box.y + api.box.h/2 - totalH/2, PAD + titleH, H - PAD - totalH);
      items.forEach(function (it, i) {
        var y = ly + i * (sz + 12);
        g.append('rect').attr('x', lx).attr('y', y).attr('width', dot).attr('height', dot).attr('rx', 3)
          .attr('fill', it.color);
        g.append('text').attr('x', lx + dot + 8).attr('y', y + dot*0.82)
          .attr('font-size', sz).attr('font-weight', cfg.labelWeight).attr('fill', ink).attr('opacity', 0.9)
          .text(trunc(it.label, 26));
      });
    } else {
      var y0 = (pos === 'top') ? PAD + titleH + sz : H - reserve + sz + 4;
      var gap = 24, rowH = sz + 12;
      var cursorX = PAD, cursorY = y0, maxW = W - 2*PAD;
      items.forEach(function (it) {
        var w = dot + 8 + String(trunc(it.label,28)).length * sz * 0.56 + gap;
        if (cursorX + w > PAD + maxW && cursorX > PAD) { cursorX = PAD; cursorY += rowH; }
        g.append('rect').attr('x', cursorX).attr('y', cursorY - dot*0.85).attr('width', dot).attr('height', dot).attr('rx', 3)
          .attr('fill', it.color);
        g.append('text').attr('x', cursorX + dot + 8).attr('y', cursorY)
          .attr('font-size', sz).attr('font-weight', cfg.labelWeight).attr('fill', ink).attr('opacity', 0.9)
          .text(trunc(it.label, 28));
        cursorX += w;
      });
    }
  }

  /* ── shared: cartesian axes ───────────────────────────────────────────────── */
  function makeYScale(type, domain, range, d3) {
    if (type === 'log') {
      var lo = domain[0] > 0 ? domain[0] : (domain[1] > 0 ? domain[1] / 1000 : 1);
      return d3.scaleLog([lo, domain[1] > lo ? domain[1] : lo * 10], range);
    }
    if (type === 'sqrt') return d3.scaleSqrt([Math.max(0, domain[0]), domain[1]], range).nice();
    return d3.scaleLinear(domain, range).nice();
  }
  /* Draw a linear/log value axis + gridlines along `dir` ('y' vertical bars up, or 'x' horizontal). */
  function drawValueAxis(api, plot, scale, dir) {
    var d3 = api.d3, cfg = api.cfg, ink = api.ink;
    if (!cfg.showGrid && !cfg.showAxes) return;
    var ticks = scale.ticks ? scale.ticks(cfg.tickCount) : [];
    var g = api.root.append('g').attr('class', 'value-axis').attr('data-canvas-input', 'numberFormat');
    ticks.forEach(function (t) {
      if (dir === 'y') {
        var y = scale(t);
        if (cfg.showGrid) g.append('line').attr('x1', plot.x).attr('y1', y).attr('x2', plot.x + plot.w).attr('y2', y)
          .attr('stroke', ink).attr('stroke-width', 1).attr('opacity', t === 0 ? 0.28 : 0.1);
        if (cfg.showAxes) g.append('text').attr('x', plot.x - 8).attr('y', y + 5).attr('text-anchor', 'end')
          .attr('font-size', clamp(cfg.labelSize, 11, 22)).attr('fill', ink).attr('opacity', 0.6).text(api.fmt(t));
      } else {
        var x = scale(t);
        if (cfg.showGrid) g.append('line').attr('x1', x).attr('y1', plot.y).attr('x2', x).attr('y2', plot.y + plot.h)
          .attr('stroke', ink).attr('stroke-width', 1).attr('opacity', t === 0 ? 0.28 : 0.1);
        if (cfg.showAxes) g.append('text').attr('x', x).attr('y', plot.y + plot.h + clamp(cfg.labelSize,11,22) + 6).attr('text-anchor', 'middle')
          .attr('font-size', clamp(cfg.labelSize, 11, 22)).attr('fill', ink).attr('opacity', 0.6).text(api.fmt(t));
      }
    });
  }
  /* Category tick labels (unrotated, thinned + truncated to stay vector-safe). */
  function drawCategoryAxis(api, plot, band, horizontal) {
    var d3 = api.d3, cfg = api.cfg, ink = api.ink;
    if (!cfg.showAxes) return;
    var cats = band.domain();
    var sz = clamp(cfg.labelSize, 11, 24);
    var g = api.root.append('g').attr('class', 'cat-axis');
    if (horizontal) {
      cats.forEach(function (c) {
        var y = band(c) + band.bandwidth()/2;
        g.append('text').attr('x', plot.x - 8).attr('y', y + sz*0.34).attr('text-anchor', 'end')
          .attr('font-size', sz).attr('font-weight', cfg.labelWeight).attr('fill', ink).attr('opacity', 0.8)
          .text(trunc(c, Math.max(6, Math.floor(plot.x / (sz*0.5)))));
      });
    } else {
      var maxChars = Math.max(3, Math.floor(band.bandwidth() / (sz * 0.5)));
      var every = Math.ceil(cats.length / Math.max(1, Math.floor(plot.w / 52)));
      cats.forEach(function (c, i) {
        if (every > 1 && i % every !== 0) return;
        var x = band(c) + band.bandwidth()/2;
        g.append('text').attr('x', x).attr('y', plot.y + plot.h + sz + 6).attr('text-anchor', 'middle')
          .attr('font-size', sz).attr('font-weight', cfg.labelWeight).attr('fill', ink).attr('opacity', 0.8)
          .text(trunc(c, maxChars + 2));
      });
    }
  }
  function drawAxisTitles(api, plot, horizontal) {
    var cfg = api.cfg, ink = api.ink;
    var sz = clamp(cfg.labelSize, 12, 22);
    if (cfg.xTitle) api.root.append('text').attr('x', plot.x + plot.w/2).attr('y', plot.y + plot.h + sz*2 + 18).attr('data-canvas-input', 'xTitle')
      .attr('text-anchor', 'middle').attr('font-size', sz).attr('font-weight', 600).attr('fill', ink).attr('opacity', 0.75).text(cfg.xTitle);
    /* Y title kept horizontal (no rotation → survives vector export), above the axis. */
    if (cfg.yTitle) api.root.append('text').attr('x', plot.x).attr('y', plot.y - 10).attr('data-canvas-input', 'yTitle')
      .attr('text-anchor', 'start').attr('font-size', sz).attr('font-weight', 600).attr('fill', ink).attr('opacity', 0.75).text(cfg.yTitle);
  }

  /* Inset the plot box to leave room for axes/labels. */
  function insetForAxes(api, horizontal) {
    var cfg = api.cfg, b = api.box;
    var sz = clamp(cfg.labelSize, 11, 24);
    var left = cfg.showAxes ? (horizontal ? Math.min(b.w * 0.28, 200) : sz * 3.2) : 8;
    var bottom = (cfg.showAxes ? sz * 2 + 8 : 8) + (cfg.xTitle ? sz + 12 : 0);
    var top = cfg.yTitle ? sz + 14 : 6;
    var right = 12;
    return { x: b.x + left, y: b.y + top, w: Math.max(20, b.w - left - right), h: Math.max(20, b.h - top - bottom) };
  }

  /* ── bars (vertical + horizontal; grouped / stacked / stacked100) ─────────── */
  function drawBars(api, horizontal) {
    var d3 = api.d3, cfg = api.cfg, series = api.series;
    var plot = insetForAxes(api, horizontal);
    var mode = (series.length > 1) ? cfg.stackMode : 'grouped';
    var scf = api.catColorFn(series.length), ccf = api.catColorFn(api.cats.length);
    var rx = clamp(cfg.cornerRadius, 0, 40);
    var stroke = cfg.strokeWidth > 0 ? { s: cfg.strokeColor, w: cfg.strokeWidth } : null;

    /* Optional sort reorders categories by their series total (or A→Z), carrying
       every series' values with them. `origIdx[k]` is the ORIGINAL index of the
       category now at position k, so category colours stay pinned to the legend. */
    var order = d3.range(api.cats.length);
    if (cfg.sort === 'desc' || cfg.sort === 'asc') {
      var total = function (i) { return d3.sum(series, function (s) { return isFinite(s.values[i]) ? +s.values[i] : 0; }); };
      order.sort(function (a, b) { return cfg.sort === 'desc' ? total(b) - total(a) : total(a) - total(b); });
    } else if (cfg.sort === 'alpha') {
      order.sort(function (a, b) { return String(api.cats[a]).localeCompare(String(api.cats[b])); });
    }
    var cats = order.map(function (i) { return api.cats[i]; });
    series = series.map(function (s) { return { name: s.name, values: order.map(function (i) { return s.values[i]; }) }; });
    function colorFor(si, ci) { return api.barByCat ? ccf(order[ci]) : scf(si); }

    /* Rows keyed by series for d3.stack. */
    var rows = cats.map(function (c, i) { var o = { _c: c }; series.forEach(function (s) { o[s.name] = +s.values[i] || 0; }); return o; });
    var keys = series.map(function (s) { return s.name; });

    if (mode === 'grouped') {
      var maxV = d3.max(series, function (s) { return d3.max(s.values, function (v) { return +v || 0; }); }) || 1;
      var minV = Math.min(0, d3.min(series, function (s) { return d3.min(s.values, function (v) { return +v || 0; }); }) || 0);
      var dom = [cfg.yZero ? Math.min(0, minV) : minV, cfg.yMax > 0 ? cfg.yMax : maxV];
      layoutGroupedBars(api, plot, horizontal, cats, series, dom, colorFor, rx, stroke);
    } else {
      var pct100 = mode === 'stacked100';
      /* Diverging offset so a negative value stacks BELOW the baseline instead of
         being mis-summed as positive-direction and clipped (Expand for 100%). */
      var offset = pct100 ? d3.stackOffsetExpand : d3.stackOffsetDiverging;
      var stacked = d3.stack().keys(keys).offset(offset)(rows);
      var maxT = d3.max(stacked, function (layer) { return d3.max(layer, function (d) { return d[1]; }); }) || 1;
      var minB = d3.min(stacked, function (layer) { return d3.min(layer, function (d) { return d[0]; }); }) || 0;
      var dom = [pct100 ? 0 : Math.min(0, minB), pct100 ? 1 : (cfg.yMax > 0 ? cfg.yMax : maxT)];
      layoutStackedBars(api, plot, horizontal, cats, stacked, dom, scf, rx, stroke, pct100);
    }
    drawAxisTitles(api, plot, horizontal);
  }

  function layoutGroupedBars(api, plot, horizontal, cats, series, dom, colorFor, rx, stroke) {
    var d3 = api.d3, cfg = api.cfg;
    var band = d3.scaleBand().domain(cats).range(horizontal ? [plot.y, plot.y + plot.h] : [plot.x, plot.x + plot.w]).padding(cfg.barPadding);
    var inner = d3.scaleBand().domain(series.map(function (s){return s.name;})).range([0, band.bandwidth()]).padding(0.06);
    var val = makeYScale(cfg.yScaleType, dom, horizontal ? [plot.x, plot.x + plot.w] : [plot.y + plot.h, plot.y], d3);
    drawValueAxis(api, plot, val, horizontal ? 'x' : 'y');
    drawCategoryAxis(api, plot, band, horizontal);
    var base = baselinePx(val, cfg.yScaleType);
    var g = api.root.append('g');
    cats.forEach(function (c, ci) {
      series.forEach(function (s, si) {
        var v = +s.values[ci]; if (!isFinite(v)) return;
        var pv = val(v); if (!isFinite(pv)) return;               // log(≤0) etc.
        var col = legible(colorFor(si, ci), api.guardBg);
        if (horizontal) {
          var y = band(c) + inner(s.name), h = inner.bandwidth();
          var x0 = Math.min(base, pv), x1 = Math.max(base, pv);
          rect(g, x0, y, Math.max(0, x1 - x0), h, col, Math.min(rx, h/2), stroke);
          if (cfg.showValues) valueLabel(api, x1 + 6, y + h/2 + 5, api.fmt(v), 'start', api.ink, 0.75);
        } else {
          var x = band(c) + inner(s.name), w = inner.bandwidth();
          var y0 = Math.min(base, pv), y1 = Math.max(base, pv);
          rect(g, x, y0, w, Math.max(0, y1 - y0), col, Math.min(rx, w/2), stroke);
          if (cfg.showValues) valueLabel(api, x + w/2, y0 - 6, api.fmt(v), 'middle', api.ink, 0.75);
        }
      });
    });
  }

  /* Pixel of the value baseline: 0 clamped into a linear domain, else the axis
     floor (log/sqrt never straddle 0). */
  function baselinePx(scale, type) {
    var dom = scale.domain();
    if (type === 'log' || type === 'sqrt') return scale(dom[0]);
    var lo = Math.min(dom[0], dom[1]), hi = Math.max(dom[0], dom[1]);
    return scale(clamp(0, lo, hi));
  }

  function layoutStackedBars(api, plot, horizontal, cats, stacked, dom, scf, rx, stroke, pct) {
    var d3 = api.d3, cfg = api.cfg;
    var band = d3.scaleBand().domain(cats).range(horizontal ? [plot.y, plot.y + plot.h] : [plot.x, plot.x + plot.w]).padding(cfg.barPadding);
    var val = makeYScale('linear', dom, horizontal ? [plot.x, plot.x + plot.w] : [plot.y + plot.h, plot.y], d3);
    drawValueAxis(api, plot, pct ? d3.scaleLinear([0,100], horizontal ? [plot.x, plot.x+plot.w] : [plot.y+plot.h, plot.y]) : val, horizontal ? 'x' : 'y');
    drawCategoryAxis(api, plot, band, horizontal);
    var g = api.root.append('g');
    stacked.forEach(function (layer, si) {
      var col = legible(scf(si), api.guardBg);
      layer.forEach(function (d, ci) {
        var a = d[0], b = d[1]; if (!isFinite(a) || !isFinite(b) || b - a === 0) return;
        var c = cats[ci];
        /* Draw between the two pixel positions regardless of sign order, so a
           negative segment (a > b) renders on the correct side of the baseline. */
        var pa = val(a), pb = val(b);
        if (horizontal) {
          var y = band(c), h = band.bandwidth();
          rect(g, Math.min(pa, pb), y, Math.abs(pb - pa), h, col, 0, stroke);
          if (cfg.showValues && Math.abs(pb - pa) > 26) valueLabel(api, (pa+pb)/2, y + h/2 + 5, pct ? Math.round((b-a)*100)+'%' : api.fmt(b-a), 'middle', autoText(col), 1);
        } else {
          var x = band(c), w = band.bandwidth();
          rect(g, x, Math.min(pa, pb), w, Math.abs(pa - pb), col, 0, stroke);
          if (cfg.showValues && Math.abs(pa - pb) > 22) valueLabel(api, x + w/2, (pa+pb)/2 + 5, pct ? Math.round((b-a)*100)+'%' : api.fmt(b-a), 'middle', autoText(col), 1);
        }
      });
    });
  }

  /* ── line + area ──────────────────────────────────────────────────────────── */
  var CURVES = null;
  function curveOf(d3, name) {
    CURVES = CURVES || { linear: d3.curveLinear, monotone: d3.curveMonotoneX, natural: d3.curveNatural,
      catmullRom: d3.curveCatmullRom, cardinal: d3.curveCardinal, basis: d3.curveBasis,
      step: d3.curveStep, stepBefore: d3.curveStepBefore, stepAfter: d3.curveStepAfter, bumpX: d3.curveBumpX };
    return CURVES[name] || d3.curveMonotoneX;
  }
  function drawLineArea(api, isArea) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats, series = api.series;
    var plot = insetForAxes(api, false);
    var stacked = isArea && series.length > 1 && cfg.stackMode !== 'grouped';
    var x = d3.scalePoint().domain(cats).range([plot.x, plot.x + plot.w]).padding(0.5);
    var scf = api.catColorFn(series.length);
    var curve = curveOf(d3, cfg.curve);
    var dom, layers = null;

    if (stacked) {
      var pct = cfg.stackMode === 'stacked100';
      var rows = cats.map(function (c, i) { var o = {}; series.forEach(function (s){ o[s.name] = +s.values[i] || 0; }); return o; });
      /* Diverging offset so negative values stack below the baseline (Expand for %). */
      layers = d3.stack().keys(series.map(function (s){return s.name;})).offset(pct ? d3.stackOffsetExpand : d3.stackOffsetDiverging)(rows);
      var maxT = d3.max(layers, function (l){ return d3.max(l, function (d){ return d[1]; }); }) || 1;
      var minB = d3.min(layers, function (l){ return d3.min(l, function (d){ return d[0]; }); }) || 0;
      dom = [pct ? 0 : Math.min(0, minB), pct ? 1 : (cfg.yMax > 0 ? cfg.yMax : maxT)];
    } else {
      var maxV = d3.max(series, function (s){ return d3.max(s.values, function (v){ return isFinite(v) ? +v : -Infinity; }); }) || 1;
      var minV = d3.min(series, function (s){ return d3.min(s.values, function (v){ return isFinite(v) ? +v : Infinity; }); });
      minV = isFinite(minV) ? minV : 0;
      dom = [cfg.yZero ? Math.min(0, minV) : minV, cfg.yMax > 0 ? cfg.yMax : maxV];
    }
    var y = makeYScale(stacked ? 'linear' : cfg.yScaleType, dom, [plot.y + plot.h, plot.y], d3);
    drawValueAxis(api, plot, y, 'y');
    /* category axis as point labels */
    (function () {
      var sz = clamp(cfg.labelSize, 11, 24);
      var every = Math.ceil(cats.length / Math.max(1, Math.floor(plot.w / 60)));
      if (cfg.showAxes) cats.forEach(function (c, i) {
        if (every > 1 && i % every !== 0) return;
        api.root.append('text').attr('x', x(c)).attr('y', plot.y + plot.h + sz + 6).attr('text-anchor', 'middle')
          .attr('font-size', sz).attr('font-weight', cfg.labelWeight).attr('fill', api.ink).attr('opacity', 0.8).text(trunc(c, 12));
      });
    })();
    var g = api.root.append('g');
    var fo = cfg.fillOpacity;

    if (stacked) {
      var area = d3.area().x(function (d, i){ return x(cats[i]); }).y0(function (d){ return y(d[0]); }).y1(function (d){ return y(d[1]); }).curve(curve);
      layers.forEach(function (layer, si) {
        var col = legible(scf(si), api.guardBg);
        g.append('path').attr('d', area(layer)).attr('fill', col).attr('fill-opacity', clamp(fo, 0.15, 1))
          .attr('stroke', col).attr('stroke-width', 1);
      });
    } else {
      series.forEach(function (s, si) {
        var col = legible(scf(si), api.guardBg);
        var pts = s.values.map(function (v, i){ return { c: cats[i], v: v }; });
        /* Also require a finite scaled y so a non-positive value under a log scale
           becomes a bridged GAP rather than an invalid (NaN) path coordinate. */
        var defined = function (d){ return isFinite(d.v) && isFinite(y(d.v)); };
        if (isArea) {
          var area = d3.area().defined(defined).x(function (d){ return x(d.c); }).y0(y(dom[0] < 0 ? 0 : dom[0])).y1(function (d){ return y(d.v); }).curve(curve);
          g.append('path').attr('d', area(pts)).attr('fill', col).attr('fill-opacity', clamp(fo, 0.08, 1)).attr('stroke', 'none');
        }
        var line = d3.line().defined(defined).x(function (d){ return x(d.c); }).y(function (d){ return y(d.v); }).curve(curve);
        g.append('path').attr('d', line(pts)).attr('fill', 'none').attr('stroke', col)
          .attr('stroke-width', cfg.lineWidth).attr('stroke-linejoin', 'round').attr('stroke-linecap', 'round');
        if (cfg.showPoints) pts.forEach(function (d) {
          if (!isFinite(d.v) || !isFinite(y(d.v))) return;
          g.append('circle').attr('cx', x(d.c)).attr('cy', y(d.v)).attr('r', clamp(cfg.pointSize/2, 2, 20))
            .attr('fill', col).attr('stroke', api.guardBg).attr('stroke-width', 1.5);
          if (cfg.showValues) valueLabel(api, x(d.c), y(d.v) - clamp(cfg.pointSize/2,2,20) - 6, api.fmt(d.v), 'middle', api.ink, 0.8);
        });
      });
    }
    drawAxisTitles(api, plot, false);
  }

  /* ── scatter / bubble ─────────────────────────────────────────────────────── */
  function drawScatter(api) {
    var d3 = api.d3, cfg = api.cfg, cols = api.numericCols, cats = api.cats;
    var plot = insetForAxes(api, false);
    var xs = cols[0].values, ys = cols[1].values;
    var sizeVals = (cfg.sizeBy === 'auto' && cols[2]) ? cols[2].values : null;
    var xdom = extentPad(d3, xs, cfg.yZero), ydom = extentPad(d3, ys, cfg.yZero);
    if (cfg.yMax > 0) ydom[1] = cfg.yMax;
    var x = makeYScale(cfg.yScaleType === 'log' ? 'linear' : cfg.yScaleType, xdom, [plot.x, plot.x + plot.w], d3);
    var y = makeYScale(cfg.yScaleType, ydom, [plot.y + plot.h, plot.y], d3);
    /* grid on both axes */
    drawValueAxis(api, plot, y, 'y');
    drawValueAxis(api, plot, x, 'x');
    var r0 = clamp(cfg.pointSize/2, 3, 30);
    var rScale = null;
    if (sizeVals) { var sd = d3.extent(sizeVals.filter(isFinite)); rScale = d3.scaleSqrt(sd[0] === sd[1] ? [0, sd[1]||1] : sd, [Math.max(4,r0*0.5), r0*2.4]); }
    var col = legible(api.catColorFn(1)(0), api.guardBg);
    var g = api.root.append('g');
    xs.forEach(function (xv, i) {
      var yv = ys[i]; if (!isFinite(xv) || !isFinite(yv)) return;
      var px = x(xv), py = y(yv); if (!isFinite(px) || !isFinite(py)) return;  // log(≤0) etc.
      var r = rScale && isFinite(sizeVals[i]) ? rScale(sizeVals[i]) : r0;
      var c = g.append('circle').attr('cx', px).attr('cy', py).attr('r', r)
        .attr('fill', col).attr('fill-opacity', clamp(cfg.fillOpacity, 0.15, 1));
      if (cfg.strokeWidth > 0) c.attr('stroke', cfg.strokeColor).attr('stroke-width', cfg.strokeWidth);
      else c.attr('stroke', api.guardBg).attr('stroke-width', 1);
      if (cfg.showValues && cats[i]) valueLabel(api, px, py - r - 5, trunc(cats[i], 14), 'middle', api.ink, 0.8);
    });
    api.root.append('text').attr('x', plot.x + plot.w/2).attr('y', plot.y + plot.h + clamp(cfg.labelSize,12,22)*2 + 14).attr('data-canvas-input', 'xTitle')
      .attr('text-anchor','middle').attr('font-size', clamp(cfg.labelSize,12,22)).attr('font-weight',600).attr('fill',api.ink).attr('opacity',0.75)
      .text(cfg.xTitle || cols[0].name);
    api.root.append('text').attr('x', plot.x).attr('y', plot.y - 10).attr('data-canvas-input', 'yTitle')
      .attr('text-anchor','start').attr('font-size', clamp(cfg.labelSize,12,22)).attr('font-weight',600).attr('fill',api.ink).attr('opacity',0.75)
      .text(cfg.yTitle || cols[1].name);
  }
  function extentPad(d3, arr, zero) {
    var e = d3.extent(arr.filter(isFinite));
    if (!isFinite(e[0])) e = [0, 1];
    if (zero) e[0] = Math.min(0, e[0]);
    if (e[0] === e[1]) { e[0] -= 1; e[1] += 1; }
    var pad = (e[1] - e[0]) * 0.06;
    /* Pad the low end too (don't push a zero baseline below zero) so the min point
       isn't drawn flush on the axis edge. */
    return [(zero && e[0] === 0) ? 0 : e[0] - pad, e[1] + pad];
  }

  /* ── pie / donut ──────────────────────────────────────────────────────────── */
  function drawPie(api, isDonut) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats;
    var vals = api.series[0].values.map(function (v){ return Math.abs(+v) || 0; });
    var items = cats.map(function (c, i){ return { label: c, value: vals[i], oi: i }; });
    items = sortItems(items, cfg.sort);
    var total = d3.sum(items, function (d){ return d.value; }) || 1;
    var b = api.box;
    var cx = b.x + b.w/2, cy = b.y + b.h/2;
    var R = Math.min(b.w, b.h)/2 * 0.92;
    var ir = isDonut ? R * cfg.donutRadius : 0;
    var ccf = api.catColorFn(cats.length);
    var pie = d3.pie().sort(null).value(function (d){ return d.value; }).padAngle(cfg.sliceGap / Math.max(R,1));
    var arc = d3.arc().innerRadius(ir).outerRadius(R).cornerRadius(clamp(cfg.cornerRadius, 0, 40));
    var g = api.root.append('g').attr('transform', 'translate(' + cx + ',' + cy + ')');
    var stroke = cfg.strokeWidth > 0 ? { s: cfg.strokeColor, w: cfg.strokeWidth } : null;
    pie(items).forEach(function (d, i) {
      var col = legible(ccf(d.data.oi), api.guardBg);
      var p = g.append('path').attr('d', arc(d)).attr('fill', col);
      if (stroke) p.attr('stroke', stroke.s).attr('stroke-width', stroke.w).attr('stroke-linejoin', 'round');
      var frac = d.data.value / total;
      if (cfg.showValues && frac > 0.03) {
        var c = arc.centroid(d);
        var lab = cfg.numberFormat === 'percent' || cfg.numberFormat === 'auto' ? Math.round(frac*100) + '%' : api.fmt(d.data.value);
        g.append('text').attr('x', c[0]).attr('y', c[1] + 6).attr('text-anchor', 'middle')
          .attr('font-size', clamp(cfg.labelSize, 12, 30)).attr('font-weight', 700).attr('fill', autoText(col)).text(lab);
      }
    });
    if (isDonut && cfg.heading === '' && cfg.subheading === '') { /* nothing centred by default */ }
  }

  /* ── radial bar ───────────────────────────────────────────────────────────── */
  function drawRadialBar(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats;
    var vals = api.series[0].values.map(function (v){ return Math.abs(+v) || 0; });
    var items = sortItems(cats.map(function (c,i){ return { label: c, value: vals[i], oi: i }; }), cfg.sort);
    var b = api.box, cx = b.x + b.w/2, cy = b.y + b.h/2;
    var R = Math.min(b.w, b.h)/2 * 0.9;
    var ir = Math.max(24, R * cfg.donutRadius);
    var maxV = cfg.yMax > 0 ? cfg.yMax : (d3.max(items, function (d){ return d.value; }) || 1);
    var xb = d3.scaleBand().domain(items.map(function (d){ return d.label; })).range([0, 2*Math.PI]).padding(clamp(cfg.barPadding, 0, 0.6));
    var rScale = makeYScale(cfg.yScaleType === 'log' ? 'linear' : cfg.yScaleType, [0, maxV], [ir, R], d3);
    var arc = d3.arc().innerRadius(function (d){ return ir; }).outerRadius(function (d){ return rScale(d.value); })
      .startAngle(function (d){ return xb(d.label); }).endAngle(function (d){ return xb(d.label) + xb.bandwidth(); })
      .padAngle(0.01).cornerRadius(clamp(cfg.cornerRadius, 0, 40));
    var ccf = api.catColorFn(cats.length);
    var g = api.root.append('g').attr('transform', 'translate(' + cx + ',' + cy + ')');
    /* faint track rings */
    if (cfg.showGrid) rScale.ticks(4).forEach(function (t){ if (t<=0) return; g.append('circle').attr('r', rScale(t)).attr('fill','none').attr('stroke', api.ink).attr('opacity', 0.1); });
    items.forEach(function (d, i) {
      var col = legible(ccf(d.oi), api.guardBg);
      var p = g.append('path').attr('d', arc(d)).attr('fill', col);
      if (cfg.strokeWidth > 0) p.attr('stroke', cfg.strokeColor).attr('stroke-width', cfg.strokeWidth).attr('stroke-linejoin','round');
      var mid = xb(d.label) + xb.bandwidth()/2 - Math.PI/2;
      var rr = rScale(d.value) + 14;
      if (cfg.showValues) {
        var lx = Math.cos(mid)*rr, ly = Math.sin(mid)*rr;
        g.append('text').attr('x', lx).attr('y', ly + 5).attr('text-anchor', Math.cos(mid) > 0.1 ? 'start' : Math.cos(mid) < -0.1 ? 'end' : 'middle')
          .attr('font-size', clamp(cfg.labelSize, 11, 22)).attr('font-weight', 600).attr('fill', api.ink).attr('opacity', 0.8)
          .text(trunc(d.label, 12) + ' ' + api.fmt(d.value));
      }
    });
  }

  /* ── radar ────────────────────────────────────────────────────────────────── */
  function drawRadar(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats, series = api.series;
    var b = api.box, cx = b.x + b.w/2, cy = b.y + b.h/2;
    var R = Math.min(b.w, b.h)/2 * 0.82;
    var n = cats.length; if (n < 3) { drawBars(api, false); return; }
    var maxV = cfg.yMax > 0 ? cfg.yMax : (d3.max(series, function (s){ return d3.max(s.values, function (v){ return +v||0; }); }) || 1);
    var rScale = d3.scaleLinear([0, maxV], [0, R]);
    var angle = function (i){ return (i / n) * 2*Math.PI - Math.PI/2; };
    var g = api.root.append('g').attr('transform', 'translate(' + cx + ',' + cy + ')');
    /* rings + spokes + axis labels */
    var rings = rScale.ticks(clamp(cfg.tickCount, 3, 6));
    rings.forEach(function (t) {
      if (t <= 0) return;
      var pts = d3.range(n).map(function (i){ return [Math.cos(angle(i))*rScale(t), Math.sin(angle(i))*rScale(t)]; });
      g.append('polygon').attr('points', pts.map(function (p){ return p[0].toFixed(1)+','+p[1].toFixed(1); }).join(' '))
        .attr('fill', 'none').attr('stroke', api.ink).attr('opacity', 0.12);
      if (cfg.showAxes) g.append('text').attr('x', 4).attr('y', -rScale(t) - 2).attr('font-size', clamp(cfg.labelSize,10,18)).attr('fill', api.ink).attr('opacity', 0.45).text(api.fmt(t));
    });
    cats.forEach(function (c, i) {
      var a = angle(i), ex = Math.cos(a)*R, ey = Math.sin(a)*R;
      g.append('line').attr('x1', 0).attr('y1', 0).attr('x2', ex).attr('y2', ey).attr('stroke', api.ink).attr('opacity', 0.14);
      var lr = R + 16;
      g.append('text').attr('x', Math.cos(a)*lr).attr('y', Math.sin(a)*lr + 4)
        .attr('text-anchor', Math.cos(a) > 0.2 ? 'start' : Math.cos(a) < -0.2 ? 'end' : 'middle')
        .attr('font-size', clamp(cfg.labelSize, 11, 22)).attr('font-weight', 500).attr('fill', api.ink).attr('opacity', 0.8).text(trunc(c, 14));
    });
    var scf = api.catColorFn(series.length);
    series.forEach(function (s, si) {
      var col = legible(scf(si), api.guardBg);
      var pts = cats.map(function (c, i){ var v = +s.values[i] || 0; return [Math.cos(angle(i))*rScale(v), Math.sin(angle(i))*rScale(v)]; });
      var poly = pts.map(function (p){ return p[0].toFixed(1)+','+p[1].toFixed(1); }).join(' ');
      g.append('polygon').attr('points', poly).attr('fill', col).attr('fill-opacity', clamp(cfg.fillOpacity*0.5, 0.05, 0.7))
        .attr('stroke', col).attr('stroke-width', cfg.lineWidth).attr('stroke-linejoin', 'round');
      if (cfg.showPoints) pts.forEach(function (p){ g.append('circle').attr('cx', p[0]).attr('cy', p[1]).attr('r', clamp(cfg.pointSize/2,2,12)).attr('fill', col); });
    });
  }

  /* ── treemap / circle pack ────────────────────────────────────────────────── */
  function drawHierarchy(api, kind) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats;
    var vals = api.series[0].values.map(function (v){ return Math.abs(+v) || 0; });
    var items = sortItems(cats.map(function (c,i){ return { label: c, value: vals[i], oi: i }; }), cfg.sort === 'none' ? 'desc' : cfg.sort);
    var b = api.box;
    var rootNode = d3.hierarchy({ children: items }).sum(function (d){ return d.value || 0; }).sort(function (a,c){ return c.value - a.value; });
    var maxV = d3.max(items, function (d){ return d.value; }) || 1;
    var seq = api.seqColorFn(0, maxV);
    var ccf = api.catColorFn(cats.length);
    var useSeq = cfg.palette !== 'suse';
    var g = api.root.append('g');
    var stroke = cfg.strokeWidth > 0 ? { s: cfg.strokeColor, w: cfg.strokeWidth } : { s: (cfg.transparent ? '#ffffff' : cfg.background), w: 2 };

    if (kind === 'treemap') {
      d3.treemap().size([b.w, b.h]).paddingInner(clamp(cfg.sliceGap || 3, 1, 12)).round(true)(rootNode);
      rootNode.leaves().forEach(function (leaf) {
        var col = legible(useSeq ? seq(leaf.value) : ccf(leaf.data.oi), api.guardBg);
        rect(g, b.x + leaf.x0, b.y + leaf.y0, leaf.x1 - leaf.x0, leaf.y1 - leaf.y0, col, clamp(cfg.cornerRadius,0,20), stroke);
        labelCell(api, b.x + leaf.x0 + 8, b.y + leaf.y0 + 8, leaf.x1 - leaf.x0 - 12, leaf.y1 - leaf.y0 - 8, leaf.data.label, leaf.value, autoText(col));
      });
    } else {
      d3.pack().size([b.w, b.h]).padding(clamp(cfg.sliceGap || 3, 1, 14))(rootNode);
      rootNode.leaves().forEach(function (leaf) {
        var col = legible(useSeq ? seq(leaf.value) : ccf(leaf.data.oi), api.guardBg);
        var c = g.append('circle').attr('cx', b.x + leaf.x).attr('cy', b.y + leaf.y).attr('r', leaf.r).attr('fill', col);
        if (stroke) c.attr('stroke', stroke.s).attr('stroke-width', stroke.w);
        if (leaf.r > 22) {
          g.append('text').attr('x', b.x + leaf.x).attr('y', b.y + leaf.y + 2).attr('text-anchor', 'middle')
            .attr('font-size', clamp(Math.min(leaf.r*0.5, cfg.labelSize), 9, 28)).attr('font-weight', 600).attr('fill', autoText(col))
            .text(trunc(leaf.data.label, Math.max(3, Math.floor(leaf.r/6))));
          if (cfg.showValues && leaf.r > 34) g.append('text').attr('x', b.x + leaf.x).attr('y', b.y + leaf.y + clamp(leaf.r*0.32,12,22)).attr('text-anchor','middle')
            .attr('font-size', clamp(leaf.r*0.32, 9, 20)).attr('fill', autoText(col)).attr('opacity', 0.85).text(api.fmt(leaf.value));
        }
      });
    }
  }
  function labelCell(api, x, y, w, h, label, value, fill) {
    var cfg = api.cfg;
    if (w < 34 || h < 22) return;
    var sz = clamp(Math.min(cfg.labelSize, w/5, h/2.4), 9, 30);
    api.root.append('text').attr('x', x).attr('y', y + sz).attr('font-size', sz).attr('font-weight', 600).attr('fill', fill)
      .text(trunc(label, Math.max(3, Math.floor(w / (sz*0.55)))));
    if (cfg.showValues && h > sz*2 + 8) api.root.append('text').attr('x', x).attr('y', y + sz*2 + 4).attr('font-size', sz*0.85).attr('fill', fill).attr('opacity', 0.85).text(api.fmt(value));
  }

  /* ── heatmap ──────────────────────────────────────────────────────────────── */
  function drawHeatmap(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats, series = api.series;
    var plot = insetForAxes(api, true);
    /* Reserve a strip above the grid for the column headers. */
    if (cfg.showAxes) { var head = clamp(cfg.labelSize, 10, 20) + 14; plot = { x: plot.x, y: plot.y + head, w: plot.w, h: Math.max(20, plot.h - head) }; }
    var colNames = series.map(function (s){ return s.name; });
    var x = d3.scaleBand().domain(colNames).range([plot.x, plot.x + plot.w]).padding(0.04);
    var y = d3.scaleBand().domain(cats).range([plot.y, plot.y + plot.h]).padding(0.04);
    var all = [];
    series.forEach(function (s){ s.values.forEach(function (v){ if (isFinite(v)) all.push(+v); }); });
    var lo = d3.min(all), hi = d3.max(all);
    if (!isFinite(lo)) { lo = 0; hi = 1; }
    var seq = api.seqColorFn(lo, hi);
    var g = api.root.append('g');
    var sz = clamp(cfg.labelSize, 10, 20);
    /* column headers */
    if (cfg.showAxes) colNames.forEach(function (c){ g.append('text').attr('x', x(c) + x.bandwidth()/2).attr('y', plot.y - 8).attr('text-anchor','middle').attr('font-size', sz).attr('font-weight',500).attr('fill', api.ink).attr('opacity',0.8).text(trunc(c, Math.max(4, Math.floor(x.bandwidth()/(sz*0.5))))); });
    if (cfg.showAxes) cats.forEach(function (c){ g.append('text').attr('x', plot.x - 8).attr('y', y(c) + y.bandwidth()/2 + sz*0.34).attr('text-anchor','end').attr('font-size', sz).attr('font-weight',500).attr('fill', api.ink).attr('opacity',0.8).text(trunc(c, 18)); });
    cats.forEach(function (c, ri) {
      series.forEach(function (s) {
        var v = s.values[ri];
        var col = isFinite(v) ? legible(seq(+v), api.guardBg) : (cfg.transparent ? '#ffffff' : cfg.background);
        var r = rect(g, x(s.name), y(c), x.bandwidth(), y.bandwidth(), isFinite(v) ? col : 'none', clamp(cfg.cornerRadius,0,14), cfg.strokeWidth>0?{s:cfg.strokeColor,w:cfg.strokeWidth}:null);
        if (!isFinite(v)) r.attr('opacity', 0.25);
        if (cfg.showValues && isFinite(v) && x.bandwidth() > 30 && y.bandwidth() > 20)
          g.append('text').attr('x', x(s.name) + x.bandwidth()/2).attr('y', y(c) + y.bandwidth()/2 + 5).attr('text-anchor','middle')
            .attr('font-size', clamp(Math.min(sz, y.bandwidth()/2.2), 8, 20)).attr('font-weight', 600).attr('fill', autoText(col)).text(api.fmt(+v));
      });
    });
  }

  /* ── histogram ────────────────────────────────────────────────────────────── */
  function drawHistogram(api) {
    var d3 = api.d3, cfg = api.cfg;
    var col0 = api.numericCols[0];
    var vals = col0.values.filter(isFinite);
    var plot = insetForAxes(api, false);
    var dom = d3.extent(vals); if (!isFinite(dom[0])) dom = [0, 1];
    if (dom[0] === dom[1]) { dom = [dom[0] - 0.5, dom[1] + 0.5]; }
    var x = d3.scaleLinear(dom, [plot.x, plot.x + plot.w]).nice();
    var thresholds = cfg.binCount > 0 ? cfg.binCount : d3.thresholdSturges(vals);
    var bins = d3.bin().domain(x.domain()).thresholds(thresholds)(vals);
    var maxC = d3.max(bins, function (b){ return b.length; }) || 1;
    var y = makeYScale(cfg.yScaleType === 'log' ? 'linear' : cfg.yScaleType, [0, cfg.yMax > 0 ? cfg.yMax : maxC], [plot.y + plot.h, plot.y], d3);
    drawValueAxis(api, plot, y, 'y');
    /* x ticks */
    if (cfg.showAxes) x.ticks(cfg.tickCount).forEach(function (t){ api.root.append('text').attr('x', x(t)).attr('y', plot.y + plot.h + clamp(cfg.labelSize,11,22) + 6).attr('text-anchor','middle').attr('font-size', clamp(cfg.labelSize,11,22)).attr('fill', api.ink).attr('opacity',0.6).text(api.fmt(t)); });
    var col = legible(api.catColorFn(1)(0), api.guardBg);
    var g = api.root.append('g');
    var pad = clamp(cfg.barPadding, 0, 0.6);
    bins.forEach(function (bn) {
      var bx = x(bn.x0), bw = Math.max(1, x(bn.x1) - x(bn.x0));
      var gap = bw * pad;
      var h = (plot.y + plot.h) - y(bn.length);
      if (h <= 0) return;
      rect(g, bx + gap/2, y(bn.length), Math.max(1, bw - gap), h, col, clamp(cfg.cornerRadius, 0, 14), cfg.strokeWidth>0?{s:cfg.strokeColor,w:cfg.strokeWidth}:null);
      if (cfg.showValues && bw > 20) valueLabel(api, bx + bw/2, y(bn.length) - 6, String(bn.length), 'middle', api.ink, 0.75);
    });
    drawAxisTitles(api, plot, false);
    if (!cfg.xTitle) api.root.append('text').attr('x', plot.x + plot.w/2).attr('y', plot.y + plot.h + clamp(cfg.labelSize,12,22)*2 + 14).attr('text-anchor','middle').attr('font-size', clamp(cfg.labelSize,12,22)).attr('font-weight',600).attr('fill',api.ink).attr('opacity',0.6).text(col0.name);
  }

  /* ══ EXPANDED CHART TYPES ═══════════════════════════════════════════════════
     Every renderer below reuses the shared helpers (insetForAxes, makeYScale,
     drawValueAxis/CategoryAxis, rect, valueLabel, catColorFn, legible, arc) and
     emits only vector-safe SVG (rect/circle/line/path/polygon/text, no rotation). */

  function niceCeil(v) {
    if (!(v > 0)) return 10;
    var mag = Math.pow(10, Math.floor(Math.log10(v))), f = v / mag;
    return (f <= 1 ? 1 : f <= 2 ? 2 : f <= 5 ? 5 : 10) * mag;
  }
  // d3-arc angle (0 = 12 o'clock, clockwise) → screen point at radius r.
  function polarXY(a, r) { return [Math.sin(a) * r, -Math.cos(a) * r]; }

  /* ── lollipop (stem + head) ─────────────────────────────────────────────── */
  function drawLollipop(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats, series = api.series;
    var plot = insetForAxes(api, false);
    var maxV = d3.max(series, function (s) { return d3.max(s.values, function (v) { return +v || 0; }); }) || 1;
    var minV = Math.min(0, d3.min(series, function (s) { return d3.min(s.values, function (v) { return +v || 0; }); }) || 0);
    var dom = [cfg.yZero ? Math.min(0, minV) : minV, cfg.yMax > 0 ? cfg.yMax : maxV];
    var band = d3.scaleBand().domain(cats).range([plot.x, plot.x + plot.w]).padding(0.35);
    var inner = d3.scaleBand().domain(series.map(function (s) { return s.name; })).range([0, band.bandwidth()]).padding(0.2);
    var val = makeYScale(cfg.yScaleType, dom, [plot.y + plot.h, plot.y], d3);
    drawValueAxis(api, plot, val, 'y'); drawCategoryAxis(api, plot, band, false);
    var base = baselinePx(val, cfg.yScaleType), scf = api.catColorFn(series.length);
    var g = api.root.append('g'), r = clamp(inner.bandwidth() * 0.36, 4, 20);
    cats.forEach(function (c, ci) { series.forEach(function (s, si) {
      var v = +s.values[ci]; if (!isFinite(v)) return; var pv = val(v); if (!isFinite(pv)) return;
      var x = band(c) + inner(s.name) + inner.bandwidth() / 2, col = legible(scf(si), api.guardBg);
      g.append('line').attr('x1', x).attr('y1', base).attr('x2', x).attr('y2', pv).attr('stroke', col).attr('stroke-width', clamp(cfg.lineWidth, 2, 8));
      g.append('circle').attr('cx', x).attr('cy', pv).attr('r', r).attr('fill', col);
      if (cfg.showValues) valueLabel(api, x, pv - r - 5, api.fmt(v), 'middle', api.ink, 0.8);
    }); });
    drawAxisTitles(api, plot, false);
  }

  /* ── dumbbell / Cleveland dot plot (needs ≥2 series) ────────────────────── */
  function drawDumbbell(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats, series = api.series;
    if (series.length < 2) { drawLollipop(api); return; }
    var plot = insetForAxes(api, true);
    var maxV = d3.max(series, function (s) { return d3.max(s.values, function (v) { return +v || 0; }); }) || 1;
    var minV = Math.min(0, d3.min(series, function (s) { return d3.min(s.values, function (v) { return +v || 0; }); }) || 0);
    var dom = [cfg.yZero ? Math.min(0, minV) : minV, cfg.yMax > 0 ? cfg.yMax : maxV];
    var band = d3.scaleBand().domain(cats).range([plot.y, plot.y + plot.h]).padding(0.45);
    var x = makeYScale(cfg.yScaleType, dom, [plot.x, plot.x + plot.w], d3);
    drawValueAxis(api, plot, x, 'x'); drawCategoryAxis(api, plot, band, true);
    var scf = api.catColorFn(series.length), g = api.root.append('g'), r = clamp(band.bandwidth() * 0.3, 5, 16);
    cats.forEach(function (c, ci) {
      var y = band(c) + band.bandwidth() / 2;
      var px = series.map(function (s) { return +s.values[ci]; }).filter(isFinite).map(function (v) { return x(v); });
      if (px.length >= 2) g.append('line').attr('x1', Math.min.apply(null, px)).attr('y1', y).attr('x2', Math.max.apply(null, px)).attr('y2', y)
        .attr('stroke', api.ink).attr('opacity', 0.25).attr('stroke-width', clamp(cfg.lineWidth, 2, 6));
      series.forEach(function (s, si) { var v = +s.values[ci]; if (!isFinite(v)) return;
        g.append('circle').attr('cx', x(v)).attr('cy', y).attr('r', r).attr('fill', legible(scf(si), api.guardBg)).attr('stroke', api.guardBg).attr('stroke-width', 1.5);
      });
    });
    drawAxisTitles(api, plot, true);
  }

  /* ── slope chart (straight segments, end-labelled) ──────────────────────── */
  function drawSlope(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats, series = api.series;
    var plot = insetForAxes(api, false);
    var maxV = d3.max(series, function (s) { return d3.max(s.values, function (v) { return +v || 0; }); }) || 1;
    var minV = d3.min(series, function (s) { return d3.min(s.values, function (v) { return +v || 0; }); }); minV = isFinite(minV) ? minV : 0;
    var y = makeYScale(cfg.yScaleType, [cfg.yZero ? Math.min(0, minV) : minV, cfg.yMax > 0 ? cfg.yMax : maxV], [plot.y + plot.h, plot.y], d3);
    var x = d3.scalePoint().domain(cats).range([plot.x, plot.x + plot.w]).padding(0.5);
    drawValueAxis(api, plot, y, 'y');
    var sz = clamp(cfg.labelSize, 11, 22);
    if (cfg.showAxes) cats.forEach(function (c) { api.root.append('text').attr('x', x(c)).attr('y', plot.y + plot.h + sz + 6).attr('text-anchor', 'middle').attr('font-size', sz).attr('font-weight', 500).attr('fill', api.ink).attr('opacity', 0.8).text(trunc(c, 14)); });
    var scf = api.catColorFn(series.length), g = api.root.append('g');
    series.forEach(function (s, si) { var col = legible(scf(si), api.guardBg);
      var pts = cats.map(function (c, i) { return { x: x(c), y: isFinite(s.values[i]) ? y(s.values[i]) : null }; }).filter(function (p) { return p.y != null; });
      if (!pts.length) return;
      g.append('path').attr('d', pts.map(function (p, i) { return (i ? 'L' : 'M') + p.x + ' ' + p.y; }).join(' ')).attr('fill', 'none').attr('stroke', col).attr('stroke-width', clamp(cfg.lineWidth, 2, 8)).attr('stroke-linejoin', 'round');
      pts.forEach(function (p) { g.append('circle').attr('cx', p.x).attr('cy', p.y).attr('r', clamp(cfg.pointSize / 2, 3, 9)).attr('fill', col); });
      var last = pts[pts.length - 1];
      g.append('text').attr('x', last.x + 8).attr('y', last.y + 4).attr('font-size', sz).attr('font-weight', 600).attr('fill', col).text(trunc(s.name, 14));
    });
    drawAxisTitles(api, plot, false);
  }

  /* ── bump / ranking chart ───────────────────────────────────────────────── */
  function drawBump(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats, series = api.series;
    var plot = insetForAxes(api, false), n = series.length;
    var x = d3.scalePoint().domain(cats).range([plot.x, plot.x + plot.w]).padding(0.6);
    var y = d3.scalePoint().domain(d3.range(1, n + 1)).range([plot.y, plot.y + plot.h]).padding(0.5);
    var ranks = cats.map(function (_, ci) {
      var order = series.map(function (s, si) { return { si: si, v: +s.values[ci] || 0 }; }).sort(function (a, b) { return b.v - a.v; });
      var m = {}; order.forEach(function (o, idx) { m[o.si] = idx + 1; }); return m;
    });
    var sz = clamp(cfg.labelSize, 11, 22);
    if (cfg.showAxes) { d3.range(1, n + 1).forEach(function (rk) { api.root.append('text').attr('x', plot.x - 10).attr('y', y(rk) + 5).attr('text-anchor', 'end').attr('font-size', sz).attr('fill', api.ink).attr('opacity', 0.5).text('#' + rk); });
      cats.forEach(function (c) { api.root.append('text').attr('x', x(c)).attr('y', plot.y + plot.h + sz + 6).attr('text-anchor', 'middle').attr('font-size', sz).attr('font-weight', 500).attr('fill', api.ink).attr('opacity', 0.8).text(trunc(c, 14)); }); }
    var scf = api.catColorFn(n), g = api.root.append('g');
    series.forEach(function (s, si) { var col = legible(scf(si), api.guardBg);
      var line = d3.line().x(function (_, ci) { return x(cats[ci]); }).y(function (_, ci) { return y(ranks[ci][si]); }).curve(d3.curveMonotoneX);
      g.append('path').attr('d', line(cats)).attr('fill', 'none').attr('stroke', col).attr('stroke-width', clamp(cfg.lineWidth, 3, 12)).attr('stroke-linecap', 'round');
      cats.forEach(function (c, ci) { g.append('circle').attr('cx', x(c)).attr('cy', y(ranks[ci][si])).attr('r', clamp(cfg.pointSize / 2, 4, 12)).attr('fill', col).attr('stroke', api.guardBg).attr('stroke-width', 2); });
      var lc = cats[cats.length - 1];
      g.append('text').attr('x', x(lc) + 10).attr('y', y(ranks[cats.length - 1][si]) + 4).attr('font-size', sz).attr('font-weight', 600).attr('fill', col).text(trunc(s.name, 12));
    });
  }

  /* ── streamgraph (wiggle offset, basis curve) ───────────────────────────── */
  function drawStream(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats, series = api.series;
    var plot = insetForAxes(api, false);
    var rows = cats.map(function (c, i) { var o = {}; series.forEach(function (s) { o[s.name] = +s.values[i] || 0; }); return o; });
    var layers = d3.stack().keys(series.map(function (s) { return s.name; })).offset(d3.stackOffsetWiggle).order(d3.stackOrderInsideOut)(rows);
    var lo = d3.min(layers, function (l) { return d3.min(l, function (d) { return d[0]; }); });
    var hi = d3.max(layers, function (l) { return d3.max(l, function (d) { return d[1]; }); });
    var x = d3.scalePoint().domain(cats).range([plot.x, plot.x + plot.w]).padding(0.4);
    var y = d3.scaleLinear([lo, hi], [plot.y + plot.h, plot.y]);
    var area = d3.area().x(function (_, i) { return x(cats[i]); }).y0(function (d) { return y(d[0]); }).y1(function (d) { return y(d[1]); }).curve(d3.curveBasis);
    var scf = api.catColorFn(series.length), g = api.root.append('g');
    layers.forEach(function (l, si) { g.append('path').attr('d', area(l)).attr('fill', legible(scf(si), api.guardBg)).attr('fill-opacity', clamp(cfg.fillOpacity, 0.3, 1)); });
    var sz = clamp(cfg.labelSize, 11, 22), every = Math.ceil(cats.length / 8);
    if (cfg.showAxes) cats.forEach(function (c, i) { if (i % every) return; api.root.append('text').attr('x', x(c)).attr('y', plot.y + plot.h + sz + 6).attr('text-anchor', 'middle').attr('font-size', sz).attr('fill', api.ink).attr('opacity', 0.7).text(trunc(c, 12)); });
  }

  /* ── waterfall (single series, running total) ───────────────────────────── */
  function drawWaterfall(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats;
    var vals = api.series[0].values.map(function (v) { return +v || 0; });
    var plot = insetForAxes(api, false), cum = 0;
    var steps = vals.map(function (v) { var s = cum; cum += v; return { start: s, end: cum, v: v }; });
    var lo = Math.min(0, d3.min(steps, function (s) { return Math.min(s.start, s.end); }));
    var hi = Math.max(0, d3.max(steps, function (s) { return Math.max(s.start, s.end); }));
    var band = d3.scaleBand().domain(cats).range([plot.x, plot.x + plot.w]).padding(clamp(cfg.barPadding, 0.1, 0.6));
    var y = d3.scaleLinear([lo, hi], [plot.y + plot.h, plot.y]).nice();
    drawValueAxis(api, plot, y, 'y'); drawCategoryAxis(api, plot, band, false);
    var up = legible(api.catColorFn(1)(0), api.guardBg), down = legible('#BD3314', api.guardBg);
    var g = api.root.append('g'), rx = clamp(cfg.cornerRadius, 0, 10);
    steps.forEach(function (s, i) { var c = cats[i], y0 = y(Math.max(s.start, s.end)), y1 = y(Math.min(s.start, s.end));
      rect(g, band(c), y0, band.bandwidth(), Math.max(1, y1 - y0), s.v >= 0 ? up : down, rx, null);
      if (i < steps.length - 1) g.append('line').attr('x1', band(c) + band.bandwidth()).attr('y1', y(s.end)).attr('x2', band(cats[i + 1])).attr('y2', y(s.end)).attr('stroke', api.ink).attr('opacity', 0.2);
      if (cfg.showValues) valueLabel(api, band(c) + band.bandwidth() / 2, y0 - 6, (s.v >= 0 ? '+' : '') + api.fmt(s.v), 'middle', api.ink, 0.75);
    });
    drawAxisTitles(api, plot, false);
  }

  /* ── marimekko / mekko (variable-width 100% stacks) ─────────────────────── */
  function drawMarimekko(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats, series = api.series;
    var plot = insetForAxes(api, false);
    var totals = cats.map(function (_, i) { return series.reduce(function (a, s) { return a + Math.abs(+s.values[i] || 0); }, 0); });
    var grand = d3.sum(totals) || 1, scf = api.catColorFn(series.length), g = api.root.append('g'), gap = 4;
    var xcur = plot.x, sz = clamp(cfg.labelSize, 10, 18);
    cats.forEach(function (c, ci) {
      var wtot = (totals[ci] / grand) * (plot.w - gap * Math.max(0, cats.length - 1)), t = totals[ci] || 1, ycur = plot.y;
      series.forEach(function (s, si) { var v = Math.abs(+s.values[ci] || 0), h = (v / t) * plot.h, col = legible(scf(si), api.guardBg);
        rect(g, xcur, ycur, wtot, h, col, 0, { s: api.guardBg, w: 1 });
        if (cfg.showValues && h > 18 && wtot > 26) valueLabel(api, xcur + wtot / 2, ycur + h / 2 + 5, api.fmt(+s.values[ci] || 0), 'middle', autoText(col), 1);
        ycur += h;
      });
      if (cfg.showAxes) api.root.append('text').attr('x', xcur + wtot / 2).attr('y', plot.y + plot.h + sz + 6).attr('text-anchor', 'middle').attr('font-size', sz).attr('font-weight', 500).attr('fill', api.ink).attr('opacity', 0.8).text(trunc(c, Math.max(3, Math.floor(wtot / (sz * 0.55)))));
      xcur += wtot + gap;
    });
  }

  /* ── parallel coordinates (numeric columns) ─────────────────────────────── */
  function drawParallel(api) {
    var d3 = api.d3, cfg = api.cfg, cols = api.numericCols;
    if (cols.length < 2) { drawScatter(api); return; }
    var plot = insetForAxes(api, false);
    var xs = cols.map(function (_, i) { return plot.x + (cols.length === 1 ? 0 : i / (cols.length - 1)) * plot.w; });
    var scales = cols.map(function (col) { var e = d3.extent(col.values.filter(isFinite)); if (!isFinite(e[0])) e = [0, 1]; if (e[0] === e[1]) { e[0] -= 1; e[1] += 1; } return d3.scaleLinear(e, [plot.y + plot.h, plot.y]).nice(); });
    var g = api.root.append('g'), sz = clamp(cfg.labelSize, 10, 18);
    cols.forEach(function (col, i) { g.append('line').attr('x1', xs[i]).attr('y1', plot.y).attr('x2', xs[i]).attr('y2', plot.y + plot.h).attr('stroke', api.ink).attr('opacity', 0.25);
      if (cfg.showAxes) { g.append('text').attr('x', xs[i]).attr('y', plot.y - 8).attr('text-anchor', 'middle').attr('font-size', sz).attr('font-weight', 600).attr('fill', api.ink).attr('opacity', 0.8).text(trunc(col.name, 12));
        scales[i].ticks(4).forEach(function (t) { g.append('text').attr('x', xs[i] - 6).attr('y', scales[i](t) + 4).attr('text-anchor', 'end').attr('font-size', sz * 0.8).attr('fill', api.ink).attr('opacity', 0.4).text(api.fmt(t)); }); }
    });
    var nRows = cols[0].values.length, ccf = api.catColorFn(nRows);
    for (var r = 0; r < nRows; r++) { var pts = cols.map(function (col, i) { var v = col.values[r]; return isFinite(v) ? [xs[i], scales[i](v)] : null; });
      if (pts.some(function (p) { return !p; })) continue;
      g.append('path').attr('d', pts.map(function (p, i) { return (i ? 'L' : 'M') + p[0] + ' ' + p[1]; }).join(' ')).attr('fill', 'none').attr('stroke', legible(ccf(r), api.guardBg)).attr('stroke-width', clamp(cfg.lineWidth, 1, 4)).attr('stroke-opacity', clamp(cfg.fillOpacity, 0.25, 1)).attr('stroke-linejoin', 'round');
    }
  }

  /* ── polar area / nightingale rose (equal angle, radius ∝ value) ────────── */
  function drawPolar(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats;
    var vals = api.series[0].values.map(function (v) { return Math.abs(+v) || 0; });
    var items = sortItems(cats.map(function (c, i) { return { label: c, value: vals[i], oi: i }; }), cfg.sort);
    var b = api.box, cx = b.x + b.w / 2, cy = b.y + b.h / 2, R = Math.min(b.w, b.h) / 2 * 0.9;
    var maxV = d3.max(items, function (d) { return d.value; }) || 1, rScale = d3.scaleSqrt([0, maxV], [0, R]);
    var n = items.length, ang = 2 * Math.PI / n, ccf = api.catColorFn(cats.length), g = api.root.append('g').attr('transform', 'translate(' + cx + ',' + cy + ')');
    if (cfg.showGrid) rScale.ticks(4).forEach(function (t) { if (t <= 0) return; g.append('circle').attr('r', rScale(t)).attr('fill', 'none').attr('stroke', api.ink).attr('opacity', 0.1); });
    items.forEach(function (d, i) {
      var arc = d3.arc().innerRadius(0).outerRadius(rScale(d.value)).startAngle(i * ang).endAngle((i + 1) * ang - 0.02).cornerRadius(clamp(cfg.cornerRadius, 0, 20));
      g.append('path').attr('d', arc()).attr('fill', legible(ccf(d.oi), api.guardBg));
      var mid = (i + 0.5) * ang, p = polarXY(mid, rScale(d.value) + 14);
      if (cfg.showValues) g.append('text').attr('x', p[0]).attr('y', p[1] + 4).attr('text-anchor', p[0] > 1 ? 'start' : p[0] < -1 ? 'end' : 'middle').attr('font-size', clamp(cfg.labelSize, 11, 20)).attr('font-weight', 600).attr('fill', api.ink).attr('opacity', 0.85).text(trunc(d.label, 10));
    });
  }

  /* ── funnel (stacked trapezoids) ────────────────────────────────────────── */
  function drawFunnel(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats;
    var vals = api.series[0].values.map(function (v) { return Math.abs(+v) || 0; });
    var items = cats.map(function (c, i) { return { label: c, value: vals[i], oi: i }; });
    if (cfg.sort !== 'none') items = sortItems(items, cfg.sort === 'asc' ? 'asc' : 'desc');
    var b = api.box, maxV = d3.max(items, function (d) { return d.value; }) || 1, n = items.length, h = b.h / n, cx = b.x + b.w / 2, maxW = b.w * 0.9;
    var ccf = api.catColorFn(cats.length), g = api.root.append('g'), wOf = function (v) { return (v / maxV) * maxW; };
    items.forEach(function (d, i) {
      var y0 = b.y + i * h, y1 = y0 + h * 0.86, wTop = wOf(d.value), wBot = wOf(i < n - 1 ? items[i + 1].value : d.value * 0.55), col = legible(ccf(d.oi), api.guardBg);
      g.append('polygon').attr('points', [[cx - wTop / 2, y0], [cx + wTop / 2, y0], [cx + wBot / 2, y1], [cx - wBot / 2, y1]].map(function (p) { return p[0].toFixed(1) + ',' + p[1].toFixed(1); }).join(' ')).attr('fill', col);
      g.append('text').attr('x', cx).attr('y', (y0 + y1) / 2 + 5).attr('text-anchor', 'middle').attr('font-size', clamp(cfg.labelSize, 12, 24)).attr('font-weight', 700).attr('fill', autoText(col)).text(trunc(d.label, 16) + (cfg.showValues ? '  ' + api.fmt(d.value) : ''));
    });
  }

  /* ── gauge (single-value dial) ──────────────────────────────────────────── */
  function drawGauge(api) {
    var d3 = api.d3, cfg = api.cfg;
    var v = +api.series[0].values[0] || 0;
    var maxV = cfg.yMax > 0 ? cfg.yMax : niceCeil(Math.max(d3.max(api.series[0].values, function (x) { return +x || 0; }) || 100, v));
    var b = api.box, cx = b.x + b.w / 2, cy = b.y + b.h * 0.68, R = Math.min(b.w / 2, b.h * 0.68) * 0.92, ir = R * Math.max(0.55, cfg.donutRadius);
    var a0 = -Math.PI / 2, a1 = Math.PI / 2, frac = clamp(v / (maxV || 1), 0, 1), g = api.root.append('g').attr('transform', 'translate(' + cx + ',' + cy + ')');
    g.append('path').attr('d', d3.arc().innerRadius(ir).outerRadius(R).startAngle(a0).endAngle(a1).cornerRadius(6)()).attr('fill', api.ink).attr('opacity', 0.1);
    g.append('path').attr('d', d3.arc().innerRadius(ir).outerRadius(R).startAngle(a0).endAngle(a0 + frac * (a1 - a0)).cornerRadius(6)()).attr('fill', legible(api.catColorFn(1)(0), api.guardBg));
    g.append('text').attr('x', 0).attr('y', -R * 0.02).attr('text-anchor', 'middle').attr('font-size', Math.min(b.w, b.h) * 0.17).attr('font-weight', 800).attr('fill', api.ink).text(api.fmt(v));
    if (api.cats[0]) g.append('text').attr('x', 0).attr('y', R * 0.24).attr('text-anchor', 'middle').attr('font-size', clamp(cfg.labelSize, 14, 30)).attr('fill', api.ink).attr('opacity', 0.6).text(trunc(api.cats[0], 22));
  }

  /* ── waffle / pictogram (10×10 share grid) ──────────────────────────────── */
  function drawWaffle(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats;
    var vals = api.series[0].values.map(function (v) { return Math.abs(+v) || 0; });
    var items = sortItems(cats.map(function (c, i) { return { label: c, value: vals[i], oi: i }; }), cfg.sort === 'none' ? 'desc' : cfg.sort);
    var total = d3.sum(items, function (d) { return d.value; }) || 1, b = api.box, cols = 10, rows = 10, N = cols * rows;
    var counts = items.map(function (d) { return Math.round(d.value / total * N); });
    if (counts.length) counts[0] += N - d3.sum(counts);
    var cell = Math.min(b.w, b.h) / Math.max(cols, rows), gap = cell * 0.14, sz = cell - gap;
    var ox = b.x + (b.w - cols * cell) / 2, oy = b.y + (b.h - rows * cell) / 2, ccf = api.catColorFn(cats.length), g = api.root.append('g');
    var seq = []; items.forEach(function (d, idx) { for (var k = 0; k < counts[idx]; k++) seq.push(d.oi); });
    for (var idx = 0; idx < N; idx++) { var oi = seq[idx];
      var rr = rows - 1 - Math.floor(idx / cols), cc = idx % cols;
      var el = rect(g, ox + cc * cell, oy + rr * cell, sz, sz, oi == null ? api.ink : legible(ccf(oi), api.guardBg), clamp(cfg.cornerRadius * 0.3, 0, cell * 0.3), null);
      if (oi == null) el.attr('opacity', 0.08);
    }
  }

  /* ── sunburst (2-level: category → series) ──────────────────────────────── */
  function hierData(cats, series) {
    return { name: 'root', children: cats.map(function (c, i) { return { name: c, children: series.map(function (s) { return { name: s.name, value: Math.abs(+s.values[i] || 0) }; }) }; }) };
  }
  function drawSunburst(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats, series = api.series;
    var b = api.box, cx = b.x + b.w / 2, cy = b.y + b.h / 2, R = Math.min(b.w, b.h) / 2 * 0.94;
    var root = d3.hierarchy(hierData(cats, series)).sum(function (d) { return d.value || 0; }).sort(function (a, c) { return c.value - a.value; });
    d3.partition().size([2 * Math.PI, R])(root);
    var arc = d3.arc().startAngle(function (d) { return d.x0; }).endAngle(function (d) { return d.x1; }).innerRadius(function (d) { return d.y0; }).outerRadius(function (d) { return d.y1; }).padAngle(0.005).cornerRadius(clamp(cfg.cornerRadius * 0.3, 0, 4));
    var ccf = api.catColorFn(cats.length), g = api.root.append('g').attr('transform', 'translate(' + cx + ',' + cy + ')');
    root.descendants().filter(function (d) { return d.depth > 0; }).forEach(function (d) {
      var top = d.depth === 1 ? d : d.parent, col = legible(ccf(cats.indexOf(top.data.name)), api.guardBg);
      if (d.depth === 2) col = d3.color(col).brighter(0.45) + '';
      g.append('path').attr('d', arc(d)).attr('fill', col).attr('stroke', api.guardBg).attr('stroke-width', 1);
      if (cfg.showValues && (d.x1 - d.x0) > 0.14) { var a = (d.x0 + d.x1) / 2, r = (d.y0 + d.y1) / 2, p = polarXY(a, r);
        g.append('text').attr('x', p[0]).attr('y', p[1] + 4).attr('text-anchor', 'middle').attr('font-size', clamp(cfg.labelSize * 0.7, 9, 16)).attr('fill', autoText(col)).text(trunc(d.data.name, 8)); }
    });
  }

  /* ── icicle (partition rectangles) ──────────────────────────────────────── */
  function drawIcicle(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats, series = api.series, b = api.box;
    var root = d3.hierarchy(hierData(cats, series)).sum(function (d) { return d.value || 0; }).sort(function (a, c) { return c.value - a.value; });
    d3.partition().size([b.w, b.h]).padding(1)(root);
    var ccf = api.catColorFn(cats.length), g = api.root.append('g');
    root.descendants().filter(function (d) { return d.depth > 0; }).forEach(function (d) {
      var top = d.depth === 1 ? d : d.parent, col = legible(ccf(cats.indexOf(top.data.name)), api.guardBg);
      if (d.depth === 2) col = d3.color(col).brighter(0.45) + '';
      rect(g, b.x + d.x0, b.y + d.y0, d.x1 - d.x0, d.y1 - d.y0, col, clamp(cfg.cornerRadius * 0.3, 0, 4), { s: api.guardBg, w: 1 });
      var w = d.x1 - d.x0, hh = d.y1 - d.y0, sz = clamp(cfg.labelSize * 0.7, 9, 16);
      if (cfg.showValues && w > 34 && hh > 18) g.append('text').attr('x', b.x + d.x0 + 6).attr('y', b.y + d.y0 + sz + 2).attr('font-size', sz).attr('font-weight', 600).attr('fill', autoText(col)).text(trunc(d.data.name, Math.floor(w / (sz * 0.55))));
    });
  }

  /* ── chord (categories × series as a flow matrix) ───────────────────────── */
  function drawChord(api) {
    var d3 = api.d3, cfg = api.cfg, cats = api.cats, series = api.series, n = cats.length;
    if (series.length < 2 || n < 2) { drawRadar(api); return; }
    var m = cats.map(function (_, i) { return d3.range(n).map(function (j) { return series[j] ? Math.abs(+series[j].values[i] || 0) : 0; }); });
    var b = api.box, cx = b.x + b.w / 2, cy = b.y + b.h / 2, R = Math.min(b.w, b.h) / 2 * 0.8, ir = R * 0.94;
    var chord = d3.chord().padAngle(0.045).sortSubgroups(d3.descending)(m);
    var arc = d3.arc().innerRadius(ir).outerRadius(R), ribbon = d3.ribbon().radius(ir), ccf = api.catColorFn(n);
    var g = api.root.append('g').attr('transform', 'translate(' + cx + ',' + cy + ')');
    chord.forEach(function (ch) { g.append('path').attr('d', ribbon(ch)).attr('fill', legible(ccf(ch.source.index), api.guardBg)).attr('fill-opacity', clamp(cfg.fillOpacity, 0.3, 0.85)).attr('stroke', api.guardBg).attr('stroke-width', 0.5); });
    chord.groups.forEach(function (grp) { var col = legible(ccf(grp.index), api.guardBg);
      g.append('path').attr('d', arc(grp)).attr('fill', col);
      var a = (grp.startAngle + grp.endAngle) / 2, p = polarXY(a, R + 12);
      g.append('text').attr('x', p[0]).attr('y', p[1] + 4).attr('text-anchor', p[0] > 1 ? 'start' : p[0] < -1 ? 'end' : 'middle').attr('font-size', clamp(cfg.labelSize, 11, 20)).attr('fill', api.ink).attr('opacity', 0.85).text(trunc(cats[grp.index] || '', 12)); });
  }


  /* ── low-level draw helpers ───────────────────────────────────────────────── */
  function rect(g, x, y, w, h, fill, rx, stroke) {
    var r = g.append('rect').attr('x', x).attr('y', y).attr('width', Math.max(0, w)).attr('height', Math.max(0, h)).attr('fill', fill);
    if (rx > 0) r.attr('rx', Math.min(rx, w/2, h/2)).attr('ry', Math.min(rx, w/2, h/2));
    if (stroke && stroke.w > 0) r.attr('stroke', stroke.s).attr('stroke-width', stroke.w);
    return r;
  }
  function valueLabel(api, x, y, text, anchor, fill, opacity) {
    api.root.append('text').attr('x', x).attr('y', y).attr('text-anchor', anchor || 'middle').attr('data-canvas-input', 'showValues')
      .attr('font-size', clamp(api.cfg.labelSize, 9, 30)).attr('font-weight', 600).attr('fill', fill).attr('opacity', opacity == null ? 1 : opacity).text(text);
  }
  function sortItems(items, order) {
    var a = items.slice();
    if (order === 'desc') a.sort(function (m, n){ return n.value - m.value; });
    else if (order === 'asc') a.sort(function (m, n){ return m.value - n.value; });
    else if (order === 'alpha') a.sort(function (m, n){ return String(m.label).localeCompare(String(n.label)); });
    return a;
  }
})();
</script>
