<svg xmlns="http://www.w3.org/2000/svg" width="760" height="620" viewBox="0 0 760 620" role="img" aria-label="Compress PDF preview">
  <style>
    .doc { animation: bob 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .bar { transform-box: fill-box; transform-origin: center; animation: squeeze 3.2s ease-in-out infinite; }
    .bar2 { animation-delay: .25s; }
    .bar3 { animation-delay: .5s; }
    .chevL { transform-box: fill-box; transform-origin: center; animation: pushR 3.2s ease-in-out infinite; }
    .chevR { transform-box: fill-box; transform-origin: center; animation: pushL 3.2s ease-in-out infinite; }
    .sheen { animation: sweep 3.2s ease-in-out infinite; }
    .badge { transform-box: fill-box; transform-origin: center; animation: pop 3.2s ease-in-out infinite; }
    .dot { animation: blink 3.2s ease-in-out infinite; }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes squeeze { 0%,18% { transform: scaleX(1); } 55%,100% { transform: scaleX(.62); } }
    @keyframes pushR { 0%,18% { transform: translateX(0); } 55%,100% { transform: translateX(26px); } }
    @keyframes pushL { 0%,18% { transform: translateX(0); } 55%,100% { transform: translateX(-26px); } }
    @keyframes sweep { 0%,12% { transform: translateX(0); opacity: 0; } 30% { opacity: .5; } 60%,100% { transform: translateX(150px); opacity: 0; } }
    @keyframes pop { 0%,45% { transform: scale(.6); opacity: 0; } 62% { transform: scale(1.12); opacity: 1; } 72%,100% { transform: scale(1); opacity: 1; } }
    @keyframes blink { 0%,40% { opacity: .25; } 62%,100% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .doc,.bar,.bar2,.bar3,.chevL,.chevR,.sheen,.badge,.dot { animation: none; }
      .bar { transform: scaleX(.62); }
      .chevL { transform: translateX(26px); }
      .chevR { transform: translateX(-26px); }
      .sheen { opacity: 0; }
      .badge { transform: scale(1); opacity: 1; }
      .dot { opacity: 1; }
    }
  </style>

  <!-- background -->
  <rect width="760" height="620" fill="#0c322c"/>
  <rect x="40" y="40" width="680" height="540" rx="26" fill="#0a2925"/>

  <!-- title -->
  <text x="72" y="104" font-family="'SUSE','SUSE Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="34" font-weight="700" fill="#efefef">Compress PDF</text>
  <text x="72" y="138" font-family="'SUSE','SUSE Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="17" font-weight="500" fill="#90ebcd">Recompress images · on your device</text>

  <!-- squeeze chevrons -->
  <g class="chevL" fill="none" stroke="#30ba78" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M120 300 l26 26 -26 26"/>
    <path d="M150 300 l26 26 -26 26"/>
  </g>
  <g class="chevR" fill="none" stroke="#30ba78" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M640 300 l-26 26 26 26"/>
    <path d="M610 300 l-26 26 26 26"/>
  </g>

  <!-- document -->
  <g class="doc">
    <rect x="298" y="184" width="196" height="256" rx="16" fill="#061e1a"/>
    <rect x="288" y="176" width="196" height="256" rx="16" fill="#f4f6f5"/>
    <!-- folded corner -->
    <path d="M446 176 h-8 v34 a4 4 0 0 0 4 4 h34 v-8 z" fill="#d4ddd8"/>

    <!-- PDF badge -->
    <rect x="308" y="200" width="66" height="26" rx="7" fill="#fe7c3f"/>
    <text x="341" y="219" text-anchor="middle" font-family="'SUSE Mono',ui-monospace,Menlo,monospace" font-size="15" font-weight="700" fill="#fff">PDF</text>

    <!-- text lines -->
    <rect x="308" y="242" width="156" height="8" rx="4" fill="#c4cec9"/>
    <rect x="308" y="258" width="120" height="8" rx="4" fill="#c4cec9"/>

    <!-- image blocks that squeeze -->
    <g>
      <rect class="bar" x="308" y="284" width="156" height="30" rx="7" fill="#30ba78"/>
      <rect class="bar bar2" x="308" y="326" width="156" height="30" rx="7" fill="#90ebcd"/>
      <rect class="bar bar3" x="308" y="368" width="156" height="30" rx="7" fill="#30ba78"/>
    </g>

    <!-- sheen -->
    <g clip-path="inset(0)">
      <rect class="sheen" x="288" y="176" width="34" height="256" fill="#ffffff" opacity="0"/>
    </g>
  </g>

  <!-- savings badge -->
  <g class="badge">
    <rect x="326" y="452" width="120" height="46" rx="23" fill="#30ba78"/>
    <text x="386" y="483" text-anchor="middle" font-family="'SUSE','SUSE Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="24" font-weight="700" fill="#08221d">−71%</text>
  </g>

  <!-- size readout -->
  <g font-family="'SUSE Mono',ui-monospace,Menlo,monospace" font-size="26" font-weight="600">
    <text x="248" y="546" text-anchor="end" fill="#7fbfa9" text-decoration="line-through">4.8 MB</text>
    <text x="272" y="546" fill="#efefef">→</text>
    <text x="304" y="546" fill="#90ebcd">1.4 MB</text>
  </g>
  <circle class="dot" cx="512" cy="537" r="6" fill="#30ba78"/>
  <text x="528" y="546" font-family="'SUSE','SUSE Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="17" font-weight="500" fill="#90ebcd">done</text>
</svg>
