<div class="sc-window" data-screen-preview>
  {{#if hasShot}}
    <img class="sc-img" src="{{asset shot}}" alt=""
         style="width:{{imgW}}%; height:{{imgH}}%; left:{{imgLeft}}%; top:{{imgTop}}%; object-fit:{{imgFit}};">
  {{else}}
    <div class="sc-empty" data-export-hide>
      <p class="sc-empty-title sc-empty-capture">Press <strong>Screenshot</strong> or <strong>Record screen</strong> above.</p>
      <p class="sc-empty-title sc-empty-upload">Pick an image in the sidebar to crop and export.</p>
      <p class="sc-empty-sub">Nothing leaves your device.</p>
    </div>
  {{/if}}
</div>
